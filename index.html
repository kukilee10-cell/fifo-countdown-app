<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FIFO Days Left</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg:        #0d0f12;
    --surface:   #161a1f;
    --card:      #1e2329;
    --border:    #2a3040;
    --accent:    #f5a623;
    --accent-dk: #c4831a;
    --danger:    #e05a4e;
    --ok:        #4caf50;
    --text:      #e8ecf0;
    --muted:     #7a8694;
    --mono:      'DM Mono', monospace;
    --sans:      'Inter', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* ─── Header ─────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .logo span { color: var(--muted); }
  .settings-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 18px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    min-height: 44px;
  }
  .settings-btn:active { background: var(--border); }

  /* ─── Main ────────────────────────────────────────────────── */
  main {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ─── No roster state ─────────────────────────────────────── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    gap: 16px;
  }
  .empty-icon {
    font-size: 56px;
    line-height: 1;
  }
  .empty-title {
    font-size: 22px;
    font-weight: 700;
  }
  .empty-sub {
    font-size: 16px;
    color: var(--muted);
    line-height: 1.5;
  }
  .cta-btn {
    margin-top: 8px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 18px 36px;
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    min-height: 56px;
    transition: background 0.15s, transform 0.1s;
  }
  .cta-btn:active { background: var(--accent-dk); transform: scale(0.98); }

  /* ─── Countdown hero ──────────────────────────────────────── */
  .hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent-dk), var(--accent), var(--accent-dk));
  }
  .hero-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .hero-number {
    font-family: var(--mono);
    font-size: clamp(72px, 22vw, 100px);
    font-weight: 500;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .hero-number.danger { color: var(--danger); }
  .hero-number.done { color: var(--ok); }
  .hero-unit {
    font-family: var(--mono);
    font-size: 16px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }
  .hero-sub {
    margin-top: 14px;
    font-size: 15px;
    color: var(--muted);
  }
  .hero-sub strong {
    color: var(--text);
    font-weight: 600;
  }

  /* ─── Progress bar ────────────────────────────────────────── */
  .progress-wrap {
    margin-top: 18px;
    background: var(--border);
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent-dk), var(--accent));
    transition: width 0.5s ease;
    min-width: 4px;
  }
  .progress-fill.done { background: var(--ok); }
  .progress-label {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* ─── Stat grid ───────────────────────────────────────────── */
  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 14px;
  }
  .stat-card.wide {
    grid-column: 1 / -1;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.ok { color: var(--ok); }
  .stat-value.danger { color: var(--danger); }
  .stat-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ─── Panel / Settings modal ──────────────────────────────── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
  }
  .overlay.open { display: flex; }
  .panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-height: 90dvh;
    overflow-y: auto;
    padding: 8px 0 40px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .panel-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin: 12px auto 20px;
  }
  .panel-title {
    font-size: 20px;
    font-weight: 700;
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  /* ─── Form ────────────────────────────────────────────────── */
  .form-group {
    padding: 0 20px;
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  input[type="date"],
  input[type="number"] {
    display: block;
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 20px;
    padding: 16px 14px;
    outline: none;
    transition: border-color 0.15s;
    min-height: 56px;
    -webkit-appearance: none;
  }
  input[type="date"]:focus,
  input[type="number"]:focus {
    border-color: var(--accent);
  }
  input[type="number"] { -moz-appearance: textfield; }
  input::-webkit-inner-spin-button,
  input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .stepper {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .stepper input {
    flex: 1;
    text-align: center;
  }
  .step-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    width: 56px;
    height: 56px;
    font-size: 26px;
    font-weight: 400;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.1s, border-color 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .step-btn:active { background: var(--border); border-color: var(--accent); }

  .save-btn {
    display: block;
    width: calc(100% - 40px);
    margin: 24px 20px 0;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 18px;
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    min-height: 56px;
    transition: background 0.15s, transform 0.1s;
  }
  .save-btn:active { background: var(--accent-dk); transform: scale(0.98); }

  .clear-btn {
    display: block;
    width: calc(100% - 40px);
    margin: 12px 20px 0;
    background: transparent;
    color: var(--danger);
    border: 1.5px solid var(--danger);
    border-radius: 14px;
    padding: 16px;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    min-height: 52px;
    transition: background 0.15s;
  }
  .clear-btn:active { background: rgba(224,90,78,0.12); }

  /* ─── Divider ─────────────────────────────────────────────── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 4px 20px 20px;
  }
  .section-head {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px 12px;
  }

  /* ─── Today marker ────────────────────────────────────────── */
  .today-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--muted);
    padding: 0 2px;
  }
  .today-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  /* ─── hidden ──────────────────────────────────────────────── */
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">FIFO <span>// Days Left</span></div>
  <button class="settings-btn" onclick="openPanel()">⚙ Roster</button>
</header>

<main id="main-content"></main>

<!-- Settings panel -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="panel" id="panel">
    <div class="panel-handle"></div>
    <div class="panel-title">My Roster</div>

    <div class="section-head">Swing Start Date</div>
    <div class="form-group">
      <label for="startDate">First day on site</label>
      <input type="date" id="startDate">
    </div>

    <div class="divider"></div>
    <div class="section-head">Roster Pattern</div>

    <div class="form-group">
      <label for="daysOn">Days ON</label>
      <div class="stepper">
        <button class="step-btn" onclick="step('daysOn',-1)">−</button>
        <input type="number" id="daysOn" min="1" max="365" value="14">
        <button class="step-btn" onclick="step('daysOn',1)">+</button>
      </div>
    </div>

    <div class="form-group">
      <label for="daysOff">Days OFF</label>
      <div class="stepper">
        <button class="step-btn" onclick="step('daysOff',-1)">−</button>
        <input type="number" id="daysOff" min="1" max="365" value="7">
        <button class="step-btn" onclick="step('daysOff',1)">+</button>
      </div>
    </div>

    <button class="save-btn" onclick="saveAndClose()">Save Roster</button>
    <button class="clear-btn" onclick="clearRoster()">Clear Roster</button>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────
const STORAGE_KEY = 'fifo_roster_v1';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ─── Date helpers ─────────────────────────────────────────────
function today() {
  const d = new Date();
  d.setHours(0,0,0,0);
  return d;
}

function parseDate(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function formatDate(d) {
  return d.toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}

function diffDays(a, b) {
  return Math.round((b - a) / 86400000);
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

// ─── Render ───────────────────────────────────────────────────
function render() {
  const roster = load();
  const el = document.getElementById('main-content');

  if (!roster) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⛏️</div>
        <div class="empty-title">Set up your roster</div>
        <div class="empty-sub">Enter your swing start date and roster pattern to start counting down.</div>
        <button class="cta-btn" onclick="openPanel()">Enter Roster Details</button>
      </div>`;
    return;
  }

  const start   = parseDate(roster.startDate);
  const daysOn  = parseInt(roster.daysOn,  10);
  const daysOff = parseInt(roster.daysOff, 10);
  const now     = today();
  const dayOfRoster = diffDays(start, now) + 1;

  // Off swing scenario
  const nextSwingStart = (() => {
    const cycleLen = daysOn + daysOff;
    const elapsed  = diffDays(start, now);
    if (elapsed < 0) return null;
    const cycles   = Math.floor(elapsed / cycleLen);
    const curCycleStart  = addDays(start, cycles * cycleLen);
    const curCycleOnEnd  = addDays(curCycleStart, daysOn);
    const curCycleOffEnd = addDays(curCycleStart, cycleLen);
    if (now < curCycleOnEnd) {
      return null;
    } else {
      return curCycleOffEnd;
    }
  })();

  const isOnSwing = nextSwingStart === null && dayOfRoster >= 1;

  // Current cycle context
  const cycleLen    = daysOn + daysOff;
  const elapsed     = diffDays(start, now);
  const cycles      = elapsed >= 0 ? Math.floor(elapsed / cycleLen) : 0;
  const curCycleStart = addDays(start, cycles * cycleLen);
  const curFlyHome    = addDays(curCycleStart, daysOn);
  const actualDayOfSwing = Math.max(1, Math.min(daysOn, diffDays(curCycleStart, now) + 1));
  const actualDaysLeft   = Math.max(0, diffDays(now, curFlyHome));
  const offDaysGone      = isOnSwing ? 0 : diffDays(curFlyHome, now);
  const offDaysLeft      = isOnSwing ? daysOff : Math.max(0, daysOff - offDaysGone);

  const pct = isOnSwing
    ? Math.min(100, Math.round(((daysOn - actualDaysLeft) / daysOn) * 100))
    : Math.min(100, Math.round((offDaysGone / daysOff) * 100));

  const heroNum  = isOnSwing ? actualDaysLeft : offDaysLeft;
  const heroClass = isOnSwing
    ? (actualDaysLeft <= 2 ? 'danger' : actualDaysLeft === 0 ? 'done' : '')
    : 'ok';

  let html = '';

  html += `
    <div class="hero">
      <div class="hero-label">${isOnSwing ? 'Days left on swing' : 'Days left at home'}</div>
      <div class="hero-number ${heroClass}">${heroNum}</div>
      <div class="hero-unit">${heroNum === 1 ? 'day' : 'days'}</div>
      <div class="hero-sub">
        ${isOnSwing
          ? `Fly home <strong>${actualDaysLeft === 0 ? 'today! ✈️' : formatDate(curFlyHome)}</strong>`
          : `Back on site <strong>${formatDate(nextSwingStart || curFlyHome)}</strong>`
        }
      </div>
      <div class="progress-wrap">
        <div class="progress-fill ${isOnSwing ? '' : 'done'}" style="width:${pct}%"></div>
      </div>
      <div class="progress-label">
        <span>${isOnSwing ? 'Day 1' : 'Fly-home'}</span>
        <span>${pct}%</span>
        <span>${isOnSwing ? `Day ${daysOn}` : 'Back on site'}</span>
      </div>
    </div>`;

  html += `<div class="stat-grid">`;

  if (isOnSwing) {
    html += `
      <div class="stat-card">
        <div class="stat-label">Swing Day</div>
        <div class="stat-value accent">${actualDayOfSwing} <span style="font-size:14px;color:var(--muted)">/ ${daysOn}</span></div>
        <div class="stat-sub">of ${daysOn} days on</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Days Left</div>
        <div class="stat-value ${actualDaysLeft <= 2 ? 'danger' : ''}">${actualDaysLeft}</div>
        <div class="stat-sub">until fly-home</div>
      </div>
      <div class="stat-card wide">
        <div class="stat-label">Fly-home Date</div>
        <div class="stat-value" style="font-size:20px">${formatDate(curFlyHome)} ✈️</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Days Off</div>
        <div class="stat-value ok">${daysOff}</div>
        <div class="stat-sub">when you get home</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Back on Site</div>
        <div class="stat-value" style="font-size:18px">${formatDate(addDays(curFlyHome, daysOff))}</div>
      </div>`;
  } else {
    html += `
      <div class="stat-card wide">
        <div class="stat-label">You're home! 🏠</div>
        <div class="stat-value ok">${offDaysLeft}</div>
        <div class="stat-sub">days off remaining</div>
      </div>
      <div class="stat-card wide">
        <div class="stat-label">Back on site</div>
        <div class="stat-value" style="font-size:20px">${formatDate(nextSwingStart)}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Days Off Gone</div>
        <div class="stat-value">${offDaysGone}</div>
        <div class="stat-sub">of ${daysOff}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Roster Pattern</div>
        <div class="stat-value">${daysOn}/${daysOff}</div>
        <div class="stat-sub">on / off</div>
      </div>`;
  }

  html += `</div>`;

  html += `
    <div class="today-row">
      <div class="today-dot"></div>
      Today is ${formatDate(now)} &bull; ${roster.daysOn}/${roster.daysOff} roster
    </div>`;

  el.innerHTML = html;
}

// ─── Panel ────────────────────────────────────────────────────
function openPanel() {
  const roster = load();
  if (roster) {
    document.getElementById('startDate').value = roster.startDate;
    document.getElementById('daysOn').value    = roster.daysOn;
    document.getElementById('daysOff').value   = roster.daysOff;
  } else {
    const d = new Date();
    const pad = n => String(n).padStart(2,'0');
    document.getElementById('startDate').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    document.getElementById('daysOn').value  = '14';
    document.getElementById('daysOff').value = '7';
  }
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closePanel();
}

function saveAndClose() {
  const startDate = document.getElementById('startDate').value;
  const daysOn    = parseInt(document.getElementById('daysOn').value, 10);
  const daysOff   = parseInt(document.getElementById('daysOff').value, 10);

  if (!startDate) { alert('Please enter your swing start date.'); return; }
  if (!daysOn || daysOn < 1)  { alert('Days ON must be at least 1.'); return; }
  if (!daysOff || daysOff < 1){ alert('Days OFF must be at least 1.'); return; }

  save({ startDate, daysOn, daysOff });
  closePanel();
  render();
}

function clearRoster() {
  if (confirm('Clear your roster details?')) {
    localStorage.removeItem(STORAGE_KEY);
    closePanel();
    render();
  }
}

function step(id, delta) {
  const el  = document.getElementById(id);
  const val = parseInt(el.value, 10) || 0;
  const min = parseInt(el.min, 10) || 1;
  const max = parseInt(el.max, 10) || 365;
  el.value  = Math.max(min, Math.min(max, val + delta));
}

// ─── Boot ─────────────────────────────────────────────────────
render();

const msToMidnight = () => {
  const now  = new Date();
  const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  return next - now;
};
setTimeout(() => { render(); setInterval(render, 86400000); }, msToMidnight());
</script>
</body>
</html>
