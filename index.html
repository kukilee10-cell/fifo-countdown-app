<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FIFO">
<meta name="theme-color" content="#f5a623">
<meta name="msapplication-TileColor" content="#0d0f12">
<meta name="msapplication-TileImage" content="icon-192.png">
<title>FIFO Countdown</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg:        #0d0f12;
    --surface:   #161a1f;
    --card:      #1e2329;
    --border:    #2a3040;
    --accent:    #f5a623;
    --accent-dk: #c4831a;
    --danger:    #e05a4e;
    --ok:        #4caf50;
    --ok-dk:     #2e7d32;
    --spotify:   #1db954;
    --spotify-dk:#17a349;
    --text:      #e8ecf0;
    --muted:     #7a8694;
    --mono:      'DM Mono', monospace;
    --sans:      'Inter', system-ui, sans-serif;
    --radius:    18px;
    --gap:       20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--sans); -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body { display: flex; flex-direction: column; min-height: 100dvh; }

  /* ── SPLASH ─────────────────────────────────────────────── */
  #splash {
    position: fixed; inset: 0; z-index: 999; background: #0d0f12;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; opacity: 1; transition: opacity 0.55s ease;
    pointer-events: all; overflow: hidden;
  }
  #splash.fade-out { opacity: 0; pointer-events: none; }
  #splash::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }
  #splash::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-60%); width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(245,166,35,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .splash-corner {
    position: absolute; width: 28px; height: 28px;
    border-color: rgba(245,166,35,0.2); border-style: solid;
    animation: splashFadeIn 0.6s ease 0.1s both;
  }
  .splash-corner.tl { top:20px;  left:20px;  border-width:2px 0 0 2px; }
  .splash-corner.tr { top:20px;  right:20px; border-width:2px 2px 0 0; }
  .splash-corner.bl { bottom:20px; left:20px;  border-width:0 0 2px 2px; }
  .splash-corner.br { bottom:20px; right:20px; border-width:0 2px 2px 0; }
  .splash-badge {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.24em;
    text-transform: uppercase; color: var(--accent-dk);
    background: rgba(245,166,35,0.08); border: 1px solid rgba(245,166,35,0.2);
    border-radius: 99px; padding: 5px 14px; margin-bottom: 30px;
    animation: splashFadeUp 0.5s ease 0.15s both;
  }
  .splash-icon {
    font-size: 58px; line-height: 1; margin-bottom: 22px;
    animation: splashFadeUp 0.5s ease 0.25s both, splashGlow 2s ease-in-out 0.8s infinite alternate;
    position: relative; z-index: 1;
  }
  .splash-title {
    font-family: var(--mono); font-size: clamp(30px,8.5vw,42px); font-weight: 500;
    letter-spacing: -0.02em; color: var(--text); line-height: 1;
    animation: splashFadeUp 0.5s ease 0.35s both; position: relative; z-index: 1;
  }
  .splash-title .accent { color: var(--accent); }
  .splash-tagline {
    font-family: var(--sans); font-size: 14px; color: var(--muted);
    letter-spacing: 0.05em; margin-top: 10px;
    animation: splashFadeUp 0.5s ease 0.45s both; position: relative; z-index: 1;
  }
  .splash-bar-wrap {
    margin-top: 56px; width: min(260px,70vw); height: 3px;
    background: rgba(42,48,64,0.8); border-radius: 99px; overflow: hidden;
    animation: splashFadeIn 0.4s ease 0.5s both; position: relative; z-index: 1;
  }
  .splash-bar-fill {
    height: 100%; width: 0%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent-dk), var(--accent), #ffc85a);
    animation: splashLoad 1.7s cubic-bezier(0.25,0.46,0.45,0.94) 0.55s forwards;
    box-shadow: 0 0 8px rgba(245,166,35,0.5);
  }
  .splash-loading-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; color: #3a4450; margin-top: 10px;
    animation: splashFadeIn 0.4s ease 0.65s both; position: relative; z-index: 1;
  }
  @keyframes splashFadeUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes splashFadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes splashLoad    { 0%{width:0%} 50%{width:70%} 80%{width:90%} 100%{width:100%} }
  @keyframes splashGlow {
    from { filter: drop-shadow(0 0 10px rgba(245,166,35,0.2)); }
    to   { filter: drop-shadow(0 0 28px rgba(245,166,35,0.55)); }
  }

  /* ── APP WRAPPER ────────────────────────────────────────── */
  #app-wrapper { display: contents; opacity: 0; transition: opacity 0.45s ease; }
  #app-wrapper.visible { opacity: 1; }

  /* ── HEADER ─────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 10;
  }
  .logo { font-family: var(--mono); font-size: 13px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
  .logo span { color: var(--muted); }
  .settings-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 11px 14px; font-family: var(--sans);
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background 0.15s; min-height: 46px;
  }
  .settings-btn:active { background: var(--border); }

  /* ── MAIN SCROLL AREA ───────────────────────────────────── */
  main {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 20px 14px 60px; display: flex; flex-direction: column; gap: 16px;
  }

  /* ── EMPTY STATE ────────────────────────────────────────── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; padding: 48px 24px 32px; gap: 14px;
  }
  .empty-icon  { font-size: 56px; line-height: 1; }
  .empty-title { font-size: 22px; font-weight: 700; }
  .empty-sub   { font-size: 16px; color: var(--muted); line-height: 1.55; max-width: 280px; }
  .cta-btn {
    margin-top: 8px; background: var(--accent); color: #000; border: none;
    border-radius: 14px; padding: 18px 36px; font-family: var(--sans);
    font-size: 17px; font-weight: 700; cursor: pointer; min-height: 56px;
    transition: background 0.15s, transform 0.1s;
  }
  .cta-btn:active { background: var(--accent-dk); transform: scale(0.98); }

  /* ── MORNING MODE CARD ──────────────────────────────────── */
  .morning-card {
    background: var(--card); border: 1px solid var(--border);
    border-left: 4px solid var(--ok); border-radius: 16px;
    padding: 16px 18px; display: flex; align-items: center; gap: 14px;
  }
  .morning-card-icon { font-size: 26px; flex-shrink: 0; }
  .morning-card-title { font-size: 15px; font-weight: 700; color: var(--ok); margin-bottom: 3px; }
  .morning-card-sub   { font-size: 13px; color: var(--muted); line-height: 1.4; }

  /* ── HERO COUNTDOWN ─────────────────────────────────────── */
  .hero {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 22px; padding: 28px 20px 24px;
    text-align: center; position: relative;
    box-shadow: 0 0 0 1px var(--border),
                0 8px 32px rgba(245,166,35,0.08),
                0 0 48px rgba(245,166,35,0.05);
  }
  .hero::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: 22px 22px 0 0;
    background: linear-gradient(90deg, var(--accent-dk), var(--accent), var(--accent-dk));
  }
  .hero-label {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  .hero-number {
    font-family: var(--mono); font-size: clamp(72px, 20vw, 104px);
    font-weight: 500; line-height: 1.05; color: var(--accent);
    letter-spacing: -0.02em; overflow: visible; display: block; width: 100%;
  }
  .hero-number.danger { color: var(--danger); }
  .hero-number.done   { color: var(--ok); }
  .hero-unit {
    font-family: var(--mono); font-size: 16px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-top: 4px;
  }
  .hero-sub { margin-top: 14px; font-size: 15px; color: var(--muted); line-height: 1.5; }
  .hero-sub strong { color: var(--text); font-weight: 600; }
  .progress-wrap {
    margin-top: 22px; background: var(--border);
    border-radius: 99px; height: 8px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent-dk), var(--accent));
    transition: width 0.5s ease; min-width: 4px;
  }
  .progress-fill.done { background: var(--ok); }
  .progress-label {
    display: flex; justify-content: space-between; margin-top: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }

  /* ── STAT GRID ──────────────────────────────────────────── */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px 14px;
  }
  .stat-card.wide    { grid-column: 1 / -1; }
  .stat-card.compact { padding: 12px 14px; }
  .stat-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--mono); font-size: 28px; font-weight: 500;
    color: var(--text); letter-spacing: -0.01em; line-height: 1.1;
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.ok     { color: var(--ok); }
  .stat-value.danger { color: var(--danger); }
  .stat-value.date-val {
    font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .stat-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* ── TODAY / ALARM STATUS ROWS ──────────────────────────── */
  .today-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; color: var(--muted); padding: 4px 2px;
  }
  .today-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }
  .alarm-status-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; color: var(--muted); padding: 0 2px;
    font-family: var(--mono);
  }
  .alarm-status-row .alarm-status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    flex-shrink: 0; box-shadow: 0 0 6px rgba(245,166,35,0.6);
  }

  /* ── WAKE-UP ALERT ──────────────────────────────────────── */
  #alarm-alert {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: #0a0c0e; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 40px 28px;
    animation: alarmPulse 1s ease-in-out infinite alternate;
  }
  #alarm-alert.active { display: flex; }
  @keyframes alarmPulse {
    from { background: #0a0c0e; }
    to   { background: #071a09; }
  }
  .alarm-alert-icon {
    font-size: 80px; line-height: 1; margin-bottom: 28px;
    animation: alarmBounce 0.6s ease infinite alternate;
  }
  @keyframes alarmBounce {
    from { transform: scale(1); }
    to   { transform: scale(1.14); }
  }
  .alarm-alert-title {
    font-family: var(--mono); font-size: clamp(38px,10vw,58px); font-weight: 500;
    color: var(--accent); letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 12px;
  }
  .alarm-alert-sub {
    font-size: 18px; color: var(--muted); margin-bottom: 52px; line-height: 1.5;
  }
  .stop-alarm-btn {
    background: var(--ok); color: #fff; border: none; border-radius: 20px;
    padding: 24px 48px; font-family: var(--sans); font-size: 21px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.04em; min-height: 72px; width: 100%;
    max-width: 340px; box-shadow: 0 0 48px rgba(76,175,80,0.45);
    transition: transform 0.1s;
  }
  .stop-alarm-btn:active { transform: scale(0.96); background: var(--ok-dk); }
  .alarm-alert-time {
    font-family: var(--mono); font-size: 14px; color: var(--muted); margin-top: 28px;
    line-height: 1.6;
  }
  .alarm-alert-btns {
    display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 340px;
  }
  .snooze-alarm-btn {
    background: var(--card); color: var(--accent); border: 1.5px solid var(--accent);
    border-radius: 20px; padding: 20px; font-family: var(--sans); font-size: 18px;
    font-weight: 700; cursor: pointer; letter-spacing: 0.02em; min-height: 62px;
    width: 100%; transition: background 0.15s, transform 0.1s;
  }
  .snooze-alarm-btn:active { background: rgba(245,166,35,0.1); transform: scale(0.96); }
  .alarm-spotify-btn {
    background: var(--spotify); color: #000; border: none;
    border-radius: 20px; padding: 20px; font-family: var(--sans); font-size: 18px;
    font-weight: 700; cursor: pointer; letter-spacing: 0.02em; min-height: 62px;
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background 0.15s, transform 0.1s;
  }
  .alarm-spotify-btn:active { background: var(--spotify-dk); transform: scale(0.96); }

  /* ── SETTINGS OVERLAY ───────────────────────────────────── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.72); z-index: 100; align-items: flex-end;
  }
  .overlay.open { display: flex; }
  .panel {
    background: var(--surface); border-top: 1px solid var(--border);
    border-radius: 26px 26px 0 0; width: 100%; max-height: 92dvh;
    overflow-y: auto; padding: 8px 0 48px; animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .panel-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 99px; margin: 14px auto 22px;
  }
  .panel-title {
    font-size: 20px; font-weight: 700; padding: 0 22px 20px;
    border-bottom: 1px solid var(--border); margin-bottom: 22px;
  }

  /* ── SETTINGS MENU (main list) ──────────────────────────── */
  .settings-menu-btn {
    display: flex; align-items: center; width: 100%; padding: 18px 22px;
    background: none; border: none; border-bottom: 1px solid var(--border);
    color: var(--text); font-family: var(--sans); font-size: 17px; font-weight: 600;
    cursor: pointer; gap: 14px; text-align: left; transition: background 0.12s;
  }
  .settings-menu-btn:active { background: rgba(255,255,255,0.04); }
  .settings-menu-btn .smb-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
  .settings-menu-btn .smb-chev { margin-left: auto; color: var(--muted); font-size: 20px; }
  .settings-menu-btn .smb-sub  { font-size: 13px; color: var(--muted); font-weight: 400; margin-top: 2px; }
  .smb-label-wrap { display: flex; flex-direction: column; }

  /* ── SETTINGS SUBPANEL ──────────────────────────────────── */
  .sub-back-btn {
    display: flex; align-items: center; gap: 8px; background: none; border: none;
    color: var(--accent); font-family: var(--sans); font-size: 16px; font-weight: 600;
    padding: 0 22px 18px; cursor: pointer; margin-top: -6px;
  }
  .sub-back-btn:active { opacity: 0.7; }
  .sub-back-btn::before { content: '‹'; font-size: 22px; line-height: 1; }

  /* ── FORM ELEMENTS ──────────────────────────────────────── */
  .form-group { padding: 0 22px; margin-bottom: 22px; }
  label {
    display: block; font-size: 12px; font-weight: 600; color: var(--muted);
    margin-bottom: 10px; letter-spacing: 0.06em; text-transform: uppercase;
  }
  input[type="date"], input[type="number"] {
    display: block; width: 100%; background: var(--card);
    border: 1.5px solid var(--border); border-radius: 14px; color: var(--text);
    font-family: var(--mono); font-size: 22px; padding: 16px 14px;
    outline: none; transition: border-color 0.15s; min-height: 58px;
    -webkit-appearance: none;
  }
  input[type="date"]:focus, input[type="number"]:focus { border-color: var(--accent); }
  input[type="number"]  { -moz-appearance: textfield; }
  input::-webkit-inner-spin-button, input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .stepper { display: flex; align-items: center; gap: 12px; }
  .stepper input { flex: 1; text-align: center; }
  .step-btn {
    background: var(--card); border: 1.5px solid var(--border); color: var(--text);
    border-radius: 14px; width: 58px; height: 58px; font-size: 28px; cursor: pointer;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, border-color 0.1s;
  }
  .step-btn:active { background: var(--border); border-color: var(--accent); }

  .save-btn {
    display: block; width: calc(100% - 44px); margin: 26px 22px 0;
    background: var(--accent); color: #000; border: none; border-radius: 14px;
    padding: 19px; font-family: var(--sans); font-size: 17px; font-weight: 700;
    cursor: pointer; min-height: 58px; transition: background 0.15s, transform 0.1s;
  }
  .save-btn:active { background: var(--accent-dk); transform: scale(0.98); }
  .clear-btn {
    display: block; width: calc(100% - 44px); margin: 14px 22px 0;
    background: transparent; color: var(--danger); border: 1.5px solid var(--danger);
    border-radius: 14px; padding: 16px; font-family: var(--sans); font-size: 16px;
    font-weight: 600; cursor: pointer; min-height: 54px; transition: background 0.15s;
  }
  .clear-btn:active { background: rgba(224,90,78,0.1); }

  .p-divider      { height: 1px; background: var(--border); margin: 6px 22px 22px; }
  .p-section-head {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); padding: 0 22px 12px;
  }
  .panel-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px; margin-bottom: 18px;
  }
  .panel-row-label { font-size: 15px; font-weight: 600; color: var(--text); }
  .panel-row-sub   { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* ── TOGGLE SWITCH ──────────────────────────────────────── */
  .toggle-status { font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
    color: var(--muted); min-width: 28px; text-align: right; }
  .toggle-status.on { color: var(--accent); }
  .toggle { position: relative; width: 54px; height: 30px; flex-shrink: 0; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; inset: 0; background: var(--border);
    border-radius: 99px; transition: background 0.2s; }
  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute; top: 4px; left: 4px; width: 22px; height: 22px;
    background: #fff; border-radius: 50%; transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4); pointer-events: none;
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(24px); }
  .toggle-inline { display: flex; align-items: center; gap: 10px; }

  /* ── TIME + SNOOZE ──────────────────────────────────────── */
  .time-input {
    width: 100%; background: var(--card); border: 1.5px solid var(--border);
    border-radius: 14px; color: var(--text); font-family: var(--mono);
    font-size: 24px; padding: 16px; outline: none;
    transition: border-color 0.15s; min-height: 58px;
    -webkit-appearance: none; text-align: center;
  }
  .time-input:focus { border-color: var(--accent); }
  .snooze-pills { display: flex; gap: 10px; }
  .snooze-pill {
    flex: 1; background: var(--card); border: 1.5px solid var(--border);
    color: var(--muted); border-radius: 12px; padding: 14px 8px;
    font-family: var(--sans); font-size: 14px; font-weight: 600;
    cursor: pointer; text-align: center; min-height: 50px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

<script>
/* ══════════════════════════════════════════════════════════
   STORAGE
══════════════════════════════════════════════════════════ */
var ROSTER_KEY       = 'fifo_roster_v1';
var ALARM_KEY        = 'fifo_alarm_v1';
var SPOTIFY_KEY      = 'fifo_spotify_v1';
var DONT_FORGET_KEY  = 'fifo_dont_forget_v1';
var NOTES_KEY        = 'fifo_notes_v1';

function loadRoster(){
  try{ var r=localStorage.getItem(ROSTER_KEY); return r?JSON.parse(r):null; }catch(e){ return null; }
}
function saveRoster(d){ localStorage.setItem(ROSTER_KEY,JSON.stringify(d)); }

function loadAlarm(){
  try{ var r=localStorage.getItem(ALARM_KEY); return r?JSON.parse(r):{time:'06:00',on:false,snooze:10}; }
  catch(e){ return {time:'06:00',on:false,snooze:10}; }
}
function saveAlarm(d){ localStorage.setItem(ALARM_KEY,JSON.stringify(d)); }

function loadSpotify(){
  try{ var r=localStorage.getItem(SPOTIFY_KEY); return r?JSON.parse(r):{url:''}; }
  catch(e){ return {url:''}; }
}
function saveSpotify(d){ localStorage.setItem(SPOTIFY_KEY,JSON.stringify(d)); }

/* ══════════════════════════════════════════════════════════
   DATE HELPERS
══════════════════════════════════════════════════════════ */
function today(){ var d=new Date(); d.setHours(0,0,0,0); return d; }
function parseDate(s){ var p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function formatDate(d){ return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short',year:'numeric'}); }
function diffDays(a,b){ return Math.round((b-a)/86400000); }
function addDays(d,n){ var r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmt12(t){
  if(!t) return '--:--';
  var p=t.split(':'), h=parseInt(p[0],10), m=p[1], ap=h>=12?'PM':'AM';
  h=h%12||12; return h+':'+m+' '+ap;
}

/* ══════════════════════════════════════════════════════════
   CALENDAR GENERATOR
══════════════════════════════════════════════════════════ */
function generateCalendarHTML() {
  var now = today();
  var year = now.getFullYear();
  var month = now.getMonth();
  
  var monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  
  var firstDay = new Date(year, month, 1, 0, 0, 0, 0);
  var startingDay = firstDay.getDay();
  var totalDays = new Date(year, month + 1, 0).getDate();
  
  var roster = loadRoster();
  
  var h = '<div class="stat-card wide" style="padding: 16px 14px;">'
    + '<div class="stat-label">📅 ' + monthNames[month] + ' ' + year + '</div>'
    + '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; margin-top: 10px; font-size: 12px; font-family: var(--mono); justify-items: center;">';
  
  var daysOfWeek = ["S", "M", "T", "W", "T", "F", "S"];
  for (var i = 0; i < 7; i++) {
    h += '<div style="width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-weight: 600; margin: 0 auto;">' + daysOfWeek[i] + '</div>';
  }
  
  for (var i = 0; i < startingDay; i++) {
    h += '<div style="width: 28px; height: 28px; margin: 0 auto;"></div>';
  }
  
  for (var d = 1; d <= totalDays; d++) {
    var dObj = new Date(year, month, d, 0, 0, 0, 0);
    var isToday = (dObj.getTime() === now.getTime());
    
    var bg = 'transparent';
    var color = 'var(--text)';
    var border = 'none';
    
    if (roster) {
      var start = parseDate(roster.startDate);
      var daysOn = parseInt(roster.daysOn,10);
      var daysOff = parseInt(roster.daysOff,10);
      var cycleLen = daysOn + daysOff;
      var elapsed = diffDays(start, dObj);
      
      var isOnSwing = false;
      if (!isNaN(elapsed)) {
        var pos = ((elapsed % cycleLen) + cycleLen) % cycleLen;
        isOnSwing = (pos < daysOn);
      }
      
      if (isOnSwing) {
        color = 'var(--accent)';
      } else {
        color = 'var(--ok)';
      }
    }
    
    if (isToday) {
      border = '1px solid var(--text)';
      bg = 'rgba(255, 255, 255, 0.1)';
    }
    
    h += '<div style="width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-weight: 500; border-radius: 50%; background: ' + bg + '; color: ' + color + '; border: ' + border + '; margin: 0 auto;">' + d + '</div>';
  }
  
  h += '</div>';
  
  if (roster) {
    h += '<div style="display: flex; justify-content: center; gap: 16px; margin-top: 12px; font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;">'
      + '<span style="color: var(--accent);">● On Site</span>'
      + '<span style="color: var(--ok);">● R&R</span>'
      + '</div>';
  }
  
  h += '</div>';
  return h;
}

/* ── ALARM AUDIO  — loud beep-beep-beep pattern ────────── */
var audioCtx=null, alarmBeepLoop=null, keepAliveInterval=null;
var testingAlarm = false;
var silentAudioEl = null;

function getAudioCtx(){
  if(!audioCtx){ try{ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  return audioCtx;
}

function playSilentLoop() {
  if (!silentAudioEl) {
    silentAudioEl = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA');
    silentAudioEl.loop = true;
  }
  silentAudioEl.play().catch(function(e) {
    console.warn("Silent loop autoplay blocked:", e);
  });
}

function startKeepAlive() {
  if (keepAliveInterval) return;
  keepAliveInterval = setInterval(function() {
    var ctx = getAudioCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
      ctx.resume().catch(function(){});
    }
    try {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.setValueAtTime(0.0001, ctx.currentTime);
      osc.start();
      osc.stop(ctx.currentTime + 0.05);
    } catch(e) {}
  }, 10000);
}

function beep(freq,dur,vol,when){
  var ctx=getAudioCtx(); if(!ctx) return;
  try{
    if (ctx.state === 'interrupted') {
      ctx.resume().catch(function(){});
    }
    var o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='square'; o.frequency.setValueAtTime(freq, when||ctx.currentTime);
    g.gain.setValueAtTime(vol||0.5, when||ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,(when||ctx.currentTime)+dur);
    o.start(when||ctx.currentTime); o.stop((when||ctx.currentTime)+dur+0.01);
  }catch(e){}
}

function playAlarmPattern(){
  /* Three sharp blasts at high volume */
  var ctx=getAudioCtx(); if(!ctx) return;
  var t=ctx.currentTime;
  beep(1046,0.14,0.7,t);
  beep(1046,0.14,0.7,t+0.20);
  beep(1046,0.14,0.7,t+0.40);
  beep(1318,0.30,0.75,t+0.65);
}

function startAlarmSound(attempt){
  attempt = attempt || 1;
  if (attempt === 1) {
    if(alarmBeepLoop){ clearInterval(alarmBeepLoop); alarmBeepLoop=null; }
  }
  var ctx = getAudioCtx();
  if (!ctx) return;

  var playBeeps = function() {
    if(alarmBeepLoop){ clearInterval(alarmBeepLoop); alarmBeepLoop=null; }
    playAlarmPattern();
    alarmBeepLoop=setInterval(playAlarmPattern, 1400);
  };

  if (silentAudioEl) {
    silentAudioEl.play().catch(function(){});
  }

  if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
    ctx.resume().then(function() {
      playBeeps();
    }).catch(function() {
      playBeeps();
      if (attempt < 4) {
        setTimeout(function() { startAlarmSound(attempt + 1); }, 1000);
      }
    });
  } else {
    playBeeps();
    if (ctx.state !== 'running' && attempt < 4) {
      setTimeout(function() { startAlarmSound(attempt + 1); }, 1000);
    }
  }
}

function stopAlarmSound(){
  if(alarmBeepLoop){ clearInterval(alarmBeepLoop); alarmBeepLoop=null; }
  testingAlarm = false;
  var btn = document.getElementById('test-sound-btn');
  if (btn) btn.textContent = '🔊 Test Alarm Sound';
}

function enableAlarmSound() {
  var ctx = getAudioCtx();
  if (ctx) {
    if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
      ctx.resume().then(function() {
        beep(880, 0.15, 0.3);
        startKeepAlive();
        playSilentLoop();
        updateEnableBtn();
      }).catch(function(e) {
        console.error(e);
      });
    } else {
      beep(880, 0.15, 0.3);
      startKeepAlive();
      playSilentLoop();
      updateEnableBtn();
    }
  }
}

function updateEnableBtn() {
  var btn = document.getElementById('enable-sound-btn');
  if (btn) {
    btn.textContent = '✅ Alarm Sound Enabled';
    btn.style.borderColor = 'var(--ok)';
    btn.style.color = 'var(--ok)';
  }
}

function testAlarmSound() {
  var ctx = getAudioCtx();
  if (!ctx) return;
  if (testingAlarm) {
    stopAlarmSound();
  } else {
    playSilentLoop();
    if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
      ctx.resume().then(function() {
        startKeepAlive();
        testingAlarm = true;
        var btn = document.getElementById('test-sound-btn');
        if (btn) btn.textContent = '⏹️ Stop Test Sound';
        startAlarmSound(1);
      });
    } else {
      testingAlarm = true;
      var btn = document.getElementById('test-sound-btn');
      if (btn) btn.textContent = '⏹️ Stop Test Sound';
      startAlarmSound(1);
    }
  }
}

function initAudioOnFirstUserGesture() {
  var unlock = function() {
    var ctx = getAudioCtx();
    if (ctx) {
      if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
        ctx.resume().then(function() {
          startKeepAlive();
          removeListeners();
        }).catch(function() {
          playSilentLoop();
        });
      } else {
        startKeepAlive();
        removeListeners();
      }
    }
  };
  function removeListeners() {
    document.removeEventListener('click', unlock);
    document.removeEventListener('touchstart', unlock);
  }
  document.addEventListener('click', unlock);
  document.addEventListener('touchstart', unlock);
}
initAudioOnFirstUserGesture();

/* ── WAKE LOCK & BEDTIME OVERLAY ───────────────────────── */
var wakeLock = null;

async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', function() {
        wakeLock = null;
      });
    } catch (err) {
      console.warn('Wake lock request failed:', err);
    }
  }
}

function releaseWakeLock() {
  if (wakeLock) {
    try {
      wakeLock.release().then(function() {
        wakeLock = null;
      });
    } catch(e) {
      wakeLock = null;
    }
  }
}

function enableBedtime() {
  var overlay = document.getElementById('bedtime-overlay');
  if (overlay) {
    overlay.style.display = 'flex';
  }
  requestWakeLock();

  var ctx = getAudioCtx();
  if (ctx) {
    ctx.resume().then(function() {
      startKeepAlive();
    }).catch(function(){});
  }
  playSilentLoop();
}

function disableBedtime() {
  var overlay = document.getElementById('bedtime-overlay');
  if (overlay) {
    overlay.style.display = 'none';
  }
  releaseWakeLock();
}

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    var overlay = document.getElementById('bedtime-overlay');
    if (overlay && overlay.style.display === 'flex') {
      requestWakeLock();
    }
  }
});

/* ── ALARM TRIGGER / STOP / SNOOZE ─────────────────────── */
var alarmFired    = false;
var snoozeTimer   = null;
var snoozeUntilTs = null;

function triggerAlarm(){
  if(alarmFired) return;
  alarmFired=true;
  
  disableBedtime();

  var now=new Date();
  document.getElementById('alarm-alert-time').textContent=
    'Alarm set for '+fmt12(loadAlarm().time)+' — '+now.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('alarm-alert').classList.add('active');
  document.body.style.overflow='hidden';
  startAlarmSound(1);
}

function stopAlarm(){
  stopAlarmSound();
  document.getElementById('alarm-alert').classList.remove('active');
  document.body.style.overflow='';
  alarmFired=false;
  snoozeUntilTs=null;
  if(snoozeTimer){ clearTimeout(snoozeTimer); snoozeTimer=null; }
  render();
}

function snoozeAlarm(){
  stopAlarmSound();
  document.getElementById('alarm-alert').classList.remove('active');
  document.body.style.overflow='';
  alarmFired=false;
  var alarm=loadAlarm();
  var mins=parseInt(alarm.snooze,10)||10;
  snoozeUntilTs=Date.now()+(mins*60000);
  if(snoozeTimer) clearTimeout(snoozeTimer);
  snoozeTimer=setTimeout(function(){
    snoozeUntilTs=null;
    triggerAlarm();
  }, mins*60000);
}

function checkAlarm(){
  if(snoozeUntilTs) return;
  var alarm=loadAlarm(); if(!alarm.on||!alarm.time) return;
  var now=new Date();
  var nowT=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  if(nowT===alarm.time&&!alarmFired) triggerAlarm();
  if(nowT!==alarm.time&&alarmFired&&!document.getElementById('alarm-alert').classList.contains('active')) alarmFired=false;
}
setInterval(checkAlarm,10000);

/* ── SPOTIFY DEEP LINK ─────────────────────────────────── */
function buildSpotifyUrls(rawUrl){
  var web = (rawUrl||'').trim() || 'https://open.spotify.com';
  var app = 'spotify://';
  var m   = web.match(/open\.spotify\.com\/(track|album|playlist|artist|show|episode)\/([A-Za-z0-9]+)/);
  if(m){ app = 'spotify:' + m[1] + ':' + m[2]; }
  return {app:app, web:web};
}

function doOpenSpotify(statusElId){
  var sp   = loadSpotify();
  var urls = buildSpotifyUrls(sp.url);
  var el   = statusElId ? document.getElementById(statusElId) : null;
  if(el){ el.textContent='Opening Spotify…'; el.className='spotify-status ok'; }

  var appOpened = false;
  function onVisibilityChange(){
    if(document.visibilityState === 'hidden'){
      appOpened = true;
    }
  }
  document.addEventListener('visibilitychange', onVisibilityChange);

  window.location.href = urls.app;

  setTimeout(function(){
    document.removeEventListener('visibilitychange', onVisibilityChange);
    if(!appOpened){
      window.location.href = urls.web;
    }
    if(el){ setTimeout(function(){ el.textContent=''; el.className='spotify-status'; }, 2000); }
  }, 2500);
}

function openSpotify(){ doOpenSpotify(null); }

/* ── ALARM STATUS LINE (main screen) ───────────────────── */
function renderAlarmStatus(){
  var el=document.getElementById('alarm-status-line');
  if(!el) return;
  var alarm=loadAlarm();
  if(alarm.on&&alarm.time){
    el.innerHTML='<div class="alarm-status-dot"></div>Alarm: '+fmt12(alarm.time)+' &middot; Snooze: '+(alarm.snooze||10)+' min
