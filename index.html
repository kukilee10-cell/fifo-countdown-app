<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FIFO">
<meta name="theme-color" content="#f5a623">
<meta name="msapplication-TileColor" content="#0d0f12">
<meta name="msapplication-TileImage" content="icon-192.png">
<title>FIFO Countdown</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg:        #0d0f12;
    --surface:   #161a1f;
    --card:      #1e2329;
    --border:    #2a3040;
    --accent:    #f5a623;
    --accent-dk: #c4831a;
    --danger:    #e05a4e;
    --ok:        #10b981; /* High contrast green */
    --ok-dk:     #065f46;
    --spotify:   #1db954;
    --spotify-dk:#17a349;
    --text:      #e8ecf0;
    --muted:     #7a8694;
    --mono:      'DM Mono', monospace;
    --sans:      'Inter', system-ui, sans-serif;
    --radius:    18px;
    --gap:       20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--sans); -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }
  body { display: flex; flex-direction: column; min-height: 100dvh; }

  /* ── SPLASH ─────────────────────────────────────────────── */
  #splash {
    position: fixed; inset: 0; z-index: 999; background: #0d0f12;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; opacity: 1; transition: opacity 0.55s ease;
    pointer-events: all; overflow: hidden;
  }
  #splash.fade-out { opacity: 0; pointer-events: none; }
  #splash::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none;
  }
  #splash::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-60%); width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(245,166,35,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .splash-corner {
    position: absolute; width: 28px; height: 28px;
    border-color: rgba(245,166,35,0.2); border-style: solid;
    animation: splashFadeIn 0.6s ease 0.1s both;
  }
  .splash-corner.tl { top:20px;  left:20px;  border-width:2px 0 0 2px; }
  .splash-corner.tr { top:20px;  right:20px; border-width:2px 2px 0 0; }
  .splash-corner.bl { bottom:20px; left:20px;  border-width:0 0 2px 2px; }
  .splash-corner.br { bottom:20px; right:20px; border-width:0 2px 2px 0; }
  .splash-badge {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.24em;
    text-transform: uppercase; color: var(--accent-dk);
    background: rgba(245,166,35,0.08); border: 1px solid rgba(245,166,35,0.2);
    border-radius: 99px; padding: 5px 14px; margin-bottom: 30px;
    animation: splashFadeUp 0.5s ease 0.15s both;
  }
  .splash-icon {
    font-size: 58px; line-height: 1; margin-bottom: 22px;
    animation: splashFadeUp 0.5s ease 0.25s both, splashGlow 2s ease-in-out 0.8s infinite alternate;
    position: relative; z-index: 1;
  }
  .splash-title {
    font-family: var(--mono); font-size: clamp(30px,8.5vw,42px); font-weight: 500;
    letter-spacing: -0.02em; color: var(--text); line-height: 1;
    animation: splashFadeUp 0.5s ease 0.35s both; position: relative; z-index: 1;
  }
  .splash-title .accent { color: var(--accent); }
  .splash-tagline {
    font-family: var(--sans); font-size: 14px; color: var(--muted);
    letter-spacing: 0.05em; margin-top: 10px;
    animation: splashFadeUp 0.5s ease 0.45s both; position: relative; z-index: 1;
  }
  .splash-bar-wrap {
    margin-top: 56px; width: min(260px,70vw); height: 3px;
    background: rgba(42,48,64,0.8); border-radius: 99px; overflow: hidden;
    animation: splashFadeIn 0.4s ease 0.5s both; position: relative; z-index: 1;
  }
  .splash-bar-fill {
    height: 100%; width: 0%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent-dk), var(--accent), #ffc85a);
    animation: splashLoad 1.7s cubic-bezier(0.25,0.46,0.45,0.94) 0.55s forwards;
    box-shadow: 0 0 8px rgba(245,166,35,0.5);
  }
  .splash-loading-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; color: #3a4450; margin-top: 10px;
    animation: splashFadeIn 0.4s ease 0.65s both; position: relative; z-index: 1;
  }
  @keyframes splashFadeUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  @keyframes splashFadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes splashLoad    { 0%{width:0%} 50%{width:70%} 80%{width:90%} 100%{width:100%} }
  @keyframes splashGlow {
    from { filter: drop-shadow(0 0 10px rgba(245,166,35,0.2)); }
    to   { filter: drop-shadow(0 0 28px rgba(245,166,35,0.55)); }
  }

  /* ── APP WRAPPER ────────────────────────────────────────── */
  #app-wrapper { display: contents; opacity: 0; transition: opacity 0.45s ease; }
  #app-wrapper.visible { opacity: 1; }

  /* ── HEADER ─────────────────────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 14px; 
    padding-top: calc(12px + env(safe-area-inset-top)); /* WebView Notch Integration */
    border-bottom: 1px solid var(--border);
    background: var(--surface); position: sticky; top: 0; z-index: 10;
  }
  .logo { font-family: var(--mono); font-size: 13px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
  .logo span { color: var(--muted); }
  .settings-btn {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 11px 14px; font-family: var(--sans);
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background 0.15s; min-height: 46px;
  }
  .settings-btn:active { background: var(--border); }

  /* ── MAIN SCROLL AREA ───────────────────────────────────── */
  main {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 20px 14px 60px; display: flex; flex-direction: column; gap: 16px;
  }

  /* ── EMPTY STATE ────────────────────────────────────────── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; padding: 48px 24px 32px; gap: 14px;
  }
  .empty-icon  { font-size: 56px; line-height: 1; }
  .empty-title { font-size: 22px; font-weight: 700; }
  .empty-sub   { font-size: 16px; color: var(--muted); line-height: 1.55; max-width: 280px; }
  .cta-btn {
    margin-top: 8px; background: var(--accent); color: #000; border: none;
    border-radius: 14px; padding: 18px 36px; font-family: var(--sans);
    font-size: 17px; font-weight: 700; cursor: pointer; min-height: 56px;
    transition: background 0.15s, transform 0.1s;
  }
  .cta-btn:active { background: var(--accent-dk); transform: scale(0.98); }

  /* Shift Alert Card */
  .shift-card {
    background: var(--card); border: 1px solid var(--border);
    border-left: 4px solid var(--accent); border-radius: 16px;
    padding: 16px 18px; display: flex; align-items: center; gap: 14px;
  }
  .shift-card-icon { font-size: 26px; flex-shrink: 0; }
  .shift-card-title { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 3px; }
  .shift-card-sub   { font-size: 13px; color: var(--muted); line-height: 1.4; }

  /* ── HERO COUNTDOWN ─────────────────────────────────────── */
  .hero {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 22px; padding: 28px 20px 24px;
    text-align: center; position: relative;
    box-shadow: 0 0 0 1px var(--border),
                0 8px 32px rgba(245,166,35,0.08),
                0 0 48px rgba(245,166,35,0.05);
  }
  .hero::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    border-radius: 22px 22px 0 0;
    background: var(--hero-accent, var(--accent));
  }
  .hero.on-rr::before {
    background: var(--ok);
  }
  .hero-label {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  .hero-number {
    font-family: var(--mono); font-size: clamp(72px, 20vw, 104px);
    font-weight: 500; line-height: 1.05; color: var(--accent);
    letter-spacing: -0.02em; overflow: visible; display: block; width: 100%;
  }
  .hero-number.danger { color: var(--danger); }
  .hero-number.done, .hero-number.ok { color: var(--ok); }
  .hero-unit {
    font-family: var(--mono); font-size: 16px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-top: 4px;
  }
  .hero-sub { margin-top: 14px; font-size: 15px; color: var(--muted); line-height: 1.5; }
  .hero-sub strong { color: var(--text); font-weight: 600; }
  .progress-wrap {
    margin-top: 22px; background: var(--border);
    border-radius: 99px; height: 8px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--accent-dk), var(--accent));
    transition: width 0.5s ease; min-width: 4px;
  }
  .progress-fill.done { background: var(--ok); }
  .progress-label {
    display: flex; justify-content: space-between; margin-top: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--muted);
  }

  /* ── STAT GRID ──────────────────────────────────────────── */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px 14px;
  }
  .stat-card.wide    { grid-column: 1 / -1; }
  .stat-card.compact { padding: 12px 14px; }
  .stat-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--mono); font-size: 28px; font-weight: 500;
    color: var(--text); letter-spacing: -0.01em; line-height: 1.1;
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.ok     { color: var(--ok); }
  .stat-value.danger { color: var(--danger); }
  .stat-value.date-val {
    font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .stat-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* ── TODAY / ALARM STATUS ROWS ──────────────────────────── */
  .today-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; color: var(--muted); padding: 4px 2px;
  }
  .today-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }
  .alarm-status-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; color: var(--muted); padding: 0 2px;
    font-family: var(--mono);
  }
  .alarm-status-row .alarm-status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    flex-shrink: 0; box-shadow: 0 0 6px rgba(245,166,35,0.6);
  }

  /* ── WAKE-UP ALERT ──────────────────────────────────────── */
  #alarm-alert {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: #0a0c0e; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 40px 28px;
    animation: alarmPulse 1s ease-in-out infinite alternate;
  }
  #alarm-alert.active { display: flex; }
  
  /* Amber flashing wake strobe animation */
  @keyframes alarmPulse {
    0%   { background: #0a0c0e; }
    50%  { background: #4a2702; } 
    100% { background: #0a0c0e; }
  }
  .alarm-alert-icon {
    font-size: 80px; line-height: 1; margin-bottom: 28px;
    animation: alarmBounce 0.6s ease infinite alternate;
  }
  @keyframes alarmBounce {
    from { transform: scale(1); }
    to   { transform: scale(1.14); }
  }
  .alarm-alert-title {
    font-family: var(--mono); font-size: clamp(38px,10vw,58px); font-weight: 500;
    color: var(--accent); letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 12px;
  }
  .alarm-alert-sub {
    font-size: 18px; color: var(--muted); margin-bottom: 52px; line-height: 1.5;
  }
  .stop-alarm-btn {
    background: var(--ok); color: #fff; border: none; border-radius: 20px;
    padding: 24px 48px; font-family: var(--sans); font-size: 21px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.04em; min-height: 72px; width: 100%;
    max-width: 340px; box-shadow: 0 0 48px rgba(76,175,80,0.45);
    transition: transform 0.1s;
  }
  .stop-alarm-btn:active { transform: scale(0.96); background: var(--ok-dk); }
  .alarm-alert-time {
    font-family: var(--mono); font-size: 14px; color: var(--muted); margin-top: 28px;
    line-height: 1.6;
  }
  .alarm-alert-btns {
    display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 340px;
  }
  .snooze-alarm-btn {
    background: var(--card); color: var(--accent); border: 1.5px solid var(--accent);
    border-radius: 20px; padding: 20px; font-family: var(--sans); font-size: 18px;
    font-weight: 700; cursor: pointer; letter-spacing: 0.02em; min-height: 62px;
    width: 100%; transition: background 0.15s, transform 0.1s;
  }
  .snooze-alarm-btn:active { background: rgba(245,166,35,0.1); transform: scale(0.96); }
  .alarm-spotify-btn {
    background: var(--spotify); color: #000; border: none;
    border-radius: 20px; padding: 20px; font-family: var(--sans); font-size: 18px;
    font-weight: 700; cursor: pointer; letter-spacing: 0.02em; min-height: 62px;
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: background 0.15s, transform 0.1s;
  }
  .alarm-spotify-btn:active { background: var(--spotify-dk); transform: scale(0.96); }

  /* ── SETTINGS OVERLAY ───────────────────────────────────── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.72); z-index: 100; align-items: flex-end;
  }
  .overlay.open { display: flex; }
  .panel {
    background: var(--surface); border-top: 1px solid var(--border);
    border-radius: 26px 26px 0 0; width: 100%; max-height: 92dvh;
    overflow-y: auto; padding: 8px 0 48px; animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .panel-handle {
    width: 40px; height: 4px; background: var(--border);
    border-radius: 99px; margin: 14px auto 22px;
  }
  .panel-title {
    font-size: 20px; font-weight: 700; padding: 0 22px 20px;
    border-bottom: 1px solid var(--border); margin-bottom: 22px;
  }

  /* ── SETTINGS MENU (main list) ──────────────────────────── */
  .settings-menu-btn {
    display: flex; align-items: center; width: 100%; padding: 18px 22px;
    background: none; border: none; border-bottom: 1px solid var(--border);
    color: var(--text); font-family: var(--sans); font-size: 17px; font-weight: 600;
    cursor: pointer; gap: 14px; text-align: left; transition: background 0.12s;
  }
  .settings-menu-btn:active { background: rgba(255,255,255,0.04); }
  .settings-menu-btn .smb-icon { font-size: 22px; flex-shrink: 0; width: 28px; text-align: center; }
  .settings-menu-btn .smb-chev { margin-left: auto; color: var(--muted); font-size: 20px; }
  .settings-menu-btn .smb-sub  { font-size: 13px; color: var(--muted); font-weight: 400; margin-top: 2px; }
  .smb-label-wrap { display: flex; flex-direction: column; }

  /* ── SETTINGS SUBPANEL ──────────────────────────────────── */
  .sub-back-btn {
    display: flex; align-items: center; gap: 8px; background: none; border: none;
    color: var(--accent); font-family: var(--sans); font-size: 16px; font-weight: 600;
    padding: 0 22px 18px; cursor: pointer; margin-top: -6px;
  }
  .sub-back-btn:active { opacity: 0.7; }
  .sub-back-btn::before { content: '‹'; font-size: 22px; line-height: 1; }

  /* ── FORM ELEMENTS ──────────────────────────────────────── */
  .form-group { padding: 0 22px; margin-bottom: 22px; }
  label {
    display: block; font-size: 12px; font-weight: 600; color: var(--muted);
    margin-bottom: 10px; letter-spacing: 0.06em; text-transform: uppercase;
  }
  input[type="date"], input[type="number"], select {
    display: block; width: 100%; background: var(--card);
    border: 1.5px solid var(--border); border-radius: 14px; color: var(--text);
    font-family: var(--mono); font-size: 22px; padding: 16px 14px;
    outline: none; transition: border-color 0.15s; min-height: 58px;
    -webkit-appearance: none;
  }
  select {
    font-family: var(--sans); font-size: 16px; font-weight: 600;
  }
  input[type="date"]:focus, input[type="number"]:focus, select:focus { border-color: var(--accent); }
  input[type="number"]  { -moz-appearance: textfield; }
  input::-webkit-inner-spin-button, input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .stepper { display: flex; align-items: center; gap: 12px; }
  .stepper input { flex: 1; text-align: center; }
  .step-btn {
    background: var(--card); border: 1.5px solid var(--border); color: var(--text);
    border-radius: 14px; width: 58px; height: 58px; font-size: 28px; cursor: pointer;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, border-color 0.1s;
  }
  .step-btn:active { background: var(--border); border-color: var(--accent); }

  .save-btn {
    display: block; width: calc(100% - 44px); margin: 26px 22px 0;
    background: var(--accent); color: #000; border: none; border-radius: 14px;
    padding: 19px; font-family: var(--sans); font-size: 17px; font-weight: 700;
    cursor: pointer; min-height: 58px; transition: background 0.15s, transform 0.1s;
  }
  .save-btn:active { background: var(--accent-dk); transform: scale(0.98); }
  .clear-btn {
    display: block; width: calc(100% - 44px); margin: 14px 22px 0;
    background: transparent; color: var(--danger); border: 1.5px solid var(--danger);
    border-radius: 14px; padding: 16px; font-family: var(--sans); font-size: 16px;
    font-weight: 600; cursor: pointer; min-height: 54px; transition: background 0.15s;
  }
  .clear-btn:active { background: rgba(224,90,78,0.1); }

  .p-divider      { height: 1px; background: var(--border); margin: 6px 22px 22px; }
  .p-section-head {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); padding: 0 22px 12px;
  }
  .panel-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px; margin-bottom: 18px;
  }
  .panel-row-label { font-size: 15px; font-weight: 600; color: var(--text); }
  .panel-row-sub   { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* ── TOGGLE SWITCH ──────────────────────────────────────── */
  .toggle-status { font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
    color: var(--muted); min-width: 28px; text-align: right; }
  .toggle-status.on { color: var(--accent); }
  .toggle { position: relative; width: 54px; height: 30px; flex-shrink: 0; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; inset: 0; background: var(--border);
    border-radius: 99px; transition: background 0.2s; }
  .toggle input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute; top: 4px; left: 4px; width: 22px; height: 22px;
    background: #fff; border-radius: 50%; transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4); pointer-events: none;
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(24px); }
  .toggle-inline { display: flex; align-items: center; gap: 10px; }

  /* ── TIME + SNOOZE ──────────────────────────────────────── */
  .time-input {
    width: 100%; background: var(--card); border: 1.5px solid var(--border);
    border-radius: 14px; color: var(--text); font-family: var(--mono);
    font-size: 24px; padding: 16px; outline: none;
    transition: border-color 0.15s; min-height: 58px;
    -webkit-appearance: none; text-align: center;
  }
  .time-input:focus { border-color: var(--accent); }
  .snooze-pills { display: flex; gap: 10px; }
  .snooze-pill {
    flex: 1; background: var(--card); border: 1.5px solid var(--border);
    color: var(--muted); border-radius: 12px; padding: 14px 8px;

  .panel-textarea {
    width: 100%; background: var(--card); border: 1.5px solid var(--border);
    border-radius: 14px; color: var(--text); font-family: var(--sans);

  .panel-textarea::placeholder { color: var(--muted); }
  .panel-save-notes-btn {
    display: block; width: calc(100% - 44px); margin: 10px 22px 0;

<script>
/* ══════════════════════════════════════════════════════════
   STORAGE
══════════════════════════════════════════════════════════ */
var ROSTER_KEY       = 'fifo_roster_v1';
var ALARM_KEY        = 'fifo_alarm_v1';
var SPOTIFY_KEY      = 'fifo_spotify_v1';
var DONT_FORGET_KEY  = 'fifo_dont_forget_v1';
var NOTES_KEY        = 'fifo_notes_v1';
var REMINDERS_KEY    = 'fifo_reminders_v1';

function loadRoster(){
  try{ var r=localStorage.getItem(ROSTER_KEY); return r?JSON.parse(r):null; }catch(e){ return null; }
}
function saveRoster(d){ localStorage.setItem(ROSTER_KEY,JSON.stringify(d)); }

function loadAlarm(){
  try{ var r=localStorage.getItem(ALARM_KEY); return r?JSON.parse(r):{time:'06:00',on:false,snooze:10}; }
  catch(e){ return {time:'06:00',on:false,snooze:10}; }
}
function saveAlarm(d){ localStorage.setItem(ALARM_KEY,JSON.stringify(d)); }

function loadSpotify(){
  try{ var r=localStorage.getItem(SPOTIFY_KEY); return r?JSON.parse(r):{url:''}; }
  catch(e){ return {url:''}; }
}
function saveSpotify(d){ localStorage.setItem(SPOTIFY_KEY,JSON.stringify(d)); }

function loadReminders() {
  try {
    var r = localStorage.getItem(REMINDERS_KEY);
    return r ? JSON.parse(r) : {};
  } catch(e) { return {}; }
}
function saveReminders(d) {
  localStorage.setItem(REMINDERS_KEY, JSON.stringify(d));
}

/* ── DATE HELPERS ────────────────────────────────────────── */
function today(){ var d=new Date(); d.setHours(0,0,0,0); return d; }
function parseDate(s){ var p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function formatDate(d){ return d.toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short',year:'numeric'}); }
function diffDays(a,b){ return Math.round((b-a)/86400000); }
function addDays(d,n){ var r=new Date(d); r.setDate(r.getDate()+n); return r; }
function fmt12(t){
  if(!t) return '--:--';
  var p=t.split(':'), h=parseInt(p[0],10), m=p[1], ap=h>=12?'PM':'AM';
  h=h%12||12; return h+':'+m+' '+ap;
}

/* ── CALENDAR GENERATOR (With Navigation & Reminders) ────── */
var calYear = null;
var calMonth = null;

function initCalendarView() {
  if (calYear === null || calMonth === null) {
    var now = today();
    calYear = now.getFullYear();
    calMonth = now.getMonth();
  }
}

function prevMonth() {
  initCalendarView();
  calMonth--;
  if (calMonth < 0) {
    calMonth = 11;
    calYear--;
  }
  render();
}

function nextMonth() {
  initCalendarView();
  calMonth++;
  if (calMonth > 11) {
    calMonth = 0;
    calYear++;
  }
  render();
}

function generateCalendarHTML() {
  initCalendarView();
  var now = today();
  
  var monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
  
  var firstDay = new Date(calYear, calMonth, 1, 0, 0, 0, 0);
  var startingDay = firstDay.getDay();
  var totalDays = new Date(calYear, calMonth + 1, 0).getDate();
  
  var roster = loadRoster();
  var reminders = loadReminders();
  
  var h = '<div class="stat-card wide" style="padding: 16px 14px;">'
    + '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">'
      + '<div class="stat-label" style="margin-bottom: 0;">📅 ' + monthNames[calMonth] + ' ' + calYear + '</div>'
      + '<div style="display: flex; gap: 8px;">'
        + '<button onclick="prevMonth()" style="background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; width: 36px; height: 36px; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; outline: none; -webkit-tap-highlight-color: transparent;">‹</button>'
        + '<button onclick="nextMonth()" style="background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; width: 36px; height: 36px; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; outline: none; -webkit-tap-highlight-color: transparent;">›</button>'
      + '</div>'
    + '</div>'
    + '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; margin-top: 10px; font-size: 11px; font-family: var(--mono); justify-items: center;">';
  
  var daysOfWeek = ["S", "M", "T", "W", "T", "F", "S"];
  for (var i = 0; i < 7; i++) {
    h += '<div style="width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-weight: 600; margin: 0 auto;">' + daysOfWeek[i] + '</div>';
  }
  
  for (var i = 0; i < startingDay; i++) {
    h += '<div style="width: 26px; height: 26px; margin: 0 auto;"></div>';
  }
  
  for (var d = 1; d <= totalDays; d++) {
    var dObj = new Date(calYear, calMonth, d, 0, 0, 0, 0);
    var isToday = (dObj.getTime() === now.getTime());
    
    var dateStr = calYear + '-' + String(calMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    var hasReminder = (reminders[dateStr] && reminders[dateStr].length > 0);
    
    var bg = 'transparent';
    var color = 'var(--text)';
    var border = 'none';
    
    if (roster) {
      var start = parseDate(roster.startDate);
      var daysOn = parseInt(roster.daysOn,10);
      var daysOff = parseInt(roster.daysOff,10);
      var cycleLen = daysOn + daysOff;
      var elapsed = diffDays(start, dObj);
      
      var isOnSwing = false;
      if (!isNaN(elapsed)) {
        var pos = ((elapsed % cycleLen) + cycleLen) % cycleLen;
        isOnSwing = (pos < daysOn);
      }
      
      if (isOnSwing) {
        color = 'var(--accent)';
      } else {
        color = 'var(--ok)';
      }
    }
    
    if (isToday) {
      border = '1px solid var(--text)';
      bg = 'rgba(255, 255, 255, 0.1)';
    }
    
    h += '<button onclick="openRemindersSub(\'' + dateStr + '\')" style="width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-weight: 500; border-radius: 50%; background: ' + bg + '; color: ' + color + '; border: ' + border + '; margin: 0 auto; cursor: pointer; position: relative; user-select: none; font-family: inherit; font-size: 11px; outline: none; -webkit-tap-highlight-color: transparent; padding: 0;">' 
      + d;
      
    if (hasReminder) {
      h += '<div style="position: absolute; bottom: 3px; width: 4px; height: 4px; background: #5cafff; border-radius: 50%;"></div>';
    }
    
    h += '</button>';
  }
  
  h += '</div>';
  
  if (roster) {
    h += '<div style="display: flex; justify-content: center; gap: 16px; margin-top: 12px; font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em;">'
      + '<span style="color: var(--accent);">● On Site</span>'
      + '<span style="color: var(--ok);">● R&R</span>'
      + '</div>';
  }
  
  h += '</div>';
  return h;
}

/* ── REMINDERS SUBPANEL ────────────────────────────────── */
function openRemindersSub(dateStr) {
  var reminders = loadReminders();
  var list = reminders[dateStr] || [];
  
  var p = dateStr.split('-');
  var dObj = new Date(p[0], p[1]-1, p[2]);
  var displayDate = dObj.toLocaleDateString('en-AU', {day:'numeric', month:'short', year:'numeric'});
  
  var h = '<div class="panel-handle"></div>'
    + '<div class="panel-title">📅 Reminders</div>'
    + '<button class="sub-back-btn" onclick="closePanel()">Close</button>'
    + '<div class="p-section-head" style="margin-bottom: 14px;">Reminders for ' + displayDate + '</div>';
    
  if (list.length === 0) {
    h += '<div style="padding: 10px 22px; color: var(--muted); font-size: 14px;">No reminders set for this date.</div>';
  } else {
    h += '<div style="padding: 0 22px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px;">';
    for (var i = 0; i < list.length; i++) {
      h += '<div style="display: flex; align-items: center; justify-content: space-between; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px;">'
        + '<span style="font-size: 15px; color: var(--text);">' + list[i] + '</span>'
        + '<button onclick="deleteReminder(\'' + dateStr + '\', ' + i + ')" style="background: none; border: none; color: var(--danger); font-size: 16px; cursor: pointer; padding: 4px 8px;">🗑️</button>'
        + '</div>';
    }
    h += '</div>';
  }
  
  h += '<div class="p-divider"></div>'
    + '<div class="form-group">'
      + '<label for="reminder-input">Add New Reminder</label>'
      + '<div style="display: flex; gap: 10px;">'
        + '<input type="text" id="reminder-input" onkeydown="if(event.key===\'Enter\') addReminder(\'' + dateStr + '\')" placeholder="e.g. Flight 10:30am, Birthday..." style="flex: 1; background: var(--card); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); padding: 12px 14px; font-size: 16px; outline: none;">'
        + '<button onclick="addReminder(\'' + dateStr + '\')" style="background: var(--accent); color: #000; border: none; border-radius: 12px; padding: 0 18px; font-weight: bold; font-size: 15px; cursor: pointer;">Add</button>'
      + '</div>'
    + '</div>';
    
  document.getElementById('settings-panel').innerHTML = h;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function addReminder(dateStr) {
  var input = document.getElementById('reminder-input');
  var text = (input ? input.value : '').trim();
  if (!text) return;
  
  var reminders = loadReminders();
  if (!reminders[dateStr]) reminders[dateStr] = [];
  reminders[dateStr].push(text);
  saveReminders(reminders);
  
  openRemindersSub(dateStr);
  render();
}

function deleteReminder(dateStr, index) {
  var reminders = loadReminders();
  if (reminders[dateStr]) {
    reminders[dateStr].splice(index, 1);
    if (reminders[dateStr].length === 0) {
      delete reminders[dateStr];
    }
    saveReminders(reminders);
  }
  openRemindersSub(dateStr);
  render();
}

/* ── ALARM AUDIO  — loud beep-beep-beep pattern ────────── */
var audioCtx=null, alarmBeepLoop=null, keepAliveInterval=null;
var testingAlarm = false;
var silentAudioEl = null;
var audioReleasedForSpotify = false;

function getAudioCtx(){
  if(!audioCtx){ try{ audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  return audioCtx;
}

function playSilentLoop() {
  if (audioReleasedForSpotify) return;
  if (!silentAudioEl) {
    silentAudioEl = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA');
    silentAudioEl.loop = true;
  }
  if (silentAudioEl.paused) {
    silentAudioEl.play().catch(function(e) {
      console.warn("Silent loop autoplay blocked:", e);
    });
  }
}

function startKeepAlive() {
  if (audioReleasedForSpotify) return;
  if (keepAliveInterval) return;
  keepAliveInterval = setInterval(function() {
    if (audioReleasedForSpotify) {
      if (keepAliveInterval) {
        clearInterval(keepAliveInterval);
        keepAliveInterval = null;
      }
      return;
    }
    var ctx = getAudioCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
      return;
    }
    try {
      var osc = ctx.createOscillator();
      var g = ctx.createGain();
      osc.connect(g);
      g.connect(ctx.destination);
      g.gain.setValueAtTime(0.0001, ctx.currentTime);
      osc.start();
      osc.stop(ctx.currentTime + 0.05);
    } catch(e) {}
  }, 10000);
}

function beep(freq,dur,vol,when){
  var ctx=getAudioCtx(); if(!ctx) return;
  try{
    if (ctx.state === 'interrupted') {
      ctx.resume().catch(function(){});
    }
    var o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='square'; o.frequency.setValueAtTime(freq, when||ctx.currentTime);
    g.gain.setValueAtTime(vol||0.5, when||ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,(when||ctx.currentTime)+dur);
    o.start(when||ctx.currentTime); o.stop((when||ctx.currentTime)+dur+0.01);
  }catch(e){}
}

function playAlarmPattern(){
  /* Three sharp blasts at high volume */
  var ctx=getAudioCtx(); if(!ctx) return;
  var t=ctx.currentTime;
  beep(1046,0.14,0.7,t);
  beep(1046,0.14,0.7,t+0.20);
  beep(1046,0.14,0.7,t+0.40);
  beep(1318,0.30,0.75,t+0.65);
}

function startAlarmSound(attempt){
  attempt = attempt || 1;
  if (attempt === 1) {
    if(alarmBeepLoop){ clearInterval(alarmBeepLoop); alarmBeepLoop=null; }
  }
  if (audioReleasedForSpotify) return;
  var ctx = getAudioCtx();
  if (!ctx) return;

  var playBeeps = function() {
    if(alarmBeepLoop) return;
    playAlarmPattern();
    alarmBeepLoop = setInterval(playAlarmPattern, 1400);
  };

  if (silentAudioEl && !audioReleasedForSpotify) {
    if (silentAudioEl.paused) {
      silentAudioEl.play().catch(function(){});
    }
  }

  if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
    ctx.resume().then(function() {
      playBeeps();
    }).catch(function() {
      playBeeps();
      if (attempt < 4) {
        setTimeout(function() {
          var c = getAudioCtx();
          if (c && (c.state === 'suspended' || c.state === 'interrupted')) {
            c.resume().catch(function(){});
          }
        }, 1000);
      }
    });
  } else {
    playBeeps();
  }
}

function stopAlarmSound(){
  if(alarmBeepLoop){ clearInterval(alarmBeepLoop); alarmBeepLoop=null; }
  testingAlarm = false;
  var btn = document.getElementById('test-sound-btn');
  if (btn) btn.textContent = '🔊 Test Alarm Sound';
}

function enableAlarmSound() {
  audioReleasedForSpotify = false;
  var ctx = getAudioCtx();
  if (ctx) {
    if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
      ctx.resume().then(function() {
        beep(880, 0.15, 0.3);
        startKeepAlive();
        playSilentLoop();
        updateEnableBtn();
      }).catch(function(e) {
        console.error(e);
      });
    } else {
      beep(880, 0.15, 0.3);
      startKeepAlive();
      playSilentLoop();
      updateEnableBtn();
    }
  }
}

function updateEnableBtn() {
  var btn = document.getElementById('enable-sound-btn');
  if (btn) {
    btn.textContent = '✅ Alarm Sound Enabled';
    btn.style.borderColor = 'var(--ok)';
    btn.style.color = 'var(--ok)';
  }
}

function testAlarmSound() {
  audioReleasedForSpotify = false;
  var ctx = getAudioCtx();
  if (!ctx) return;
  if (testingAlarm) {
    stopAlarmSound();
  } else {
    playSilentLoop();
    if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
      ctx.resume().then(function() {
        startKeepAlive();
        testingAlarm = true;
        var btn = document.getElementById('test-sound-btn');
        if (btn) btn.textContent = '⏹️ Stop Test Sound';
        startAlarmSound(1);
      });
    } else {
      testingAlarm = true;
      var btn = document.getElementById('test-sound-btn');
      if (btn) btn.textContent = '⏹️ Stop Test Sound';
      startAlarmSound(1);
    }
  }
}

function releaseAudioControl() {
  audioReleasedForSpotify = true;
  stopAlarmSound();
  if (keepAliveInterval) {
    clearInterval(keepAliveInterval);
    keepAliveInterval = null;
  }
  if (silentAudioEl) {
    try {
      silentAudioEl.pause();
    } catch(e){}
  }
  if (audioCtx) {
    audioCtx.suspend().catch(function(){});
  }
}

function initAudioOnFirstUserGesture() {
  var unlock = function() {
    var ctx = getAudioCtx();
    if (ctx) {
      if (ctx.state === 'suspended' || ctx.state === 'interrupted') {
        ctx.resume().then(function() {
          startKeepAlive();
          removeListeners();
        }).catch(function() {
          playSilentLoop();
        });
      } else {
        startKeepAlive();
        removeListeners();
      }
    }
  };
  function removeListeners() {
    document.removeEventListener('click', unlock);
    document.removeEventListener('touchstart', unlock);
  }
  document.addEventListener('click', unlock);
  document.addEventListener('touchstart', unlock);
}
initAudioOnFirstUserGesture();

/* ── WAKE LOCK & BEDTIME OVERLAY ───────────────────────── */
var wakeLock = null;

async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', function() {
        wakeLock = null;
      });
    } catch (err) {
      console.warn('Wake lock request failed:', err);
    }
  }
}

function releaseWakeLock() {
  if (wakeLock) {
    try {
      wakeLock.release().then(function() {
        wakeLock = null;
      });
    } catch(e) {
      wakeLock = null;
    }
  }
}

function updateBedtimeBtn(active){
  var btn=document.getElementById('bedtime-btn');
  if(!btn) return;
  if(active){
    btn.textContent='🌙\u00a0 Bedtime Active';
    btn.style.borderColor='var(--ok)';
    btn.style.color='var(--ok)';
  } else {
    btn.textContent='🌙\u00a0 Bedtime';
    btn.style.borderColor='';
    btn.style.color='';
  }
}

// Global toggle for Bedtime Mode
function toggleBedtime(){
  var overlay=document.getElementById('bedtime-overlay');
  if(overlay && overlay.style.display==='flex'){
    disableBedtime();
  } else {
    enableBedtime();
  }
}

function enableBedtime() {
  audioReleasedForSpotify = false;
  var overlay = document.getElementById('bedtime-overlay');
  if (overlay) {
    overlay.style.display = 'flex';
  }
  requestWakeLock();
  updateBedtimeBtn(true);

  var ctx = getAudioCtx();
  if (ctx) {
    ctx.resume().then(function() {
      startKeepAlive();
    }).catch(function(){});
  }
  playSilentLoop();
}

function disableBedtime() {
  var overlay = document.getElementById('bedtime-overlay');
  if (overlay) {
    overlay.style.display = 'none';
  }
  releaseWakeLock();
  updateBedtimeBtn(false);
}

document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') {
    var overlay = document.getElementById('bedtime-overlay');
    if (overlay && overlay.style.display === 'flex') {
      requestWakeLock();
    }
    var ctx = getAudioCtx();
    if (ctx && (ctx.state === 'suspended' || ctx.state === 'interrupted') && !audioReleasedForSpotify) {
      ctx.resume().catch(function(){});
    }
  }
});

/* ── ALARM TRIGGER / STOP / SNOOZE ─────────────────────── */
var alarmFired       = false;
var snoozeUntilTs    = null;
var lastAlarmDateKey = null; /* "YYYY-MM-DD_HH:MM" — fires once per scheduled slot */

function triggerAlarm(){
  if(alarmFired) return;
  alarmFired=true;

  audioReleasedForSpotify = false; /* Guard against permanent silencing if Spotify was previously run */
  disableBedtime();

  var now=new Date();
  document.getElementById('alarm-alert-time').textContent=
    'Alarm set for '+fmt12(loadAlarm().time)+' — '+now.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('alarm-alert').classList.add('active');
  document.body.style.overflow='hidden';
  startAlarmSound(1);
}

/* ✅ I'M UP — leave alarmFired=true so checkAlarm can't re-fire this minute */
function stopAlarm(){
  stopAlarmSound();
  document.getElementById('alarm-alert').classList.remove('active');
  document.body.style.overflow='';
  snoozeUntilTs=null;
  disableBedtime();
  render();
}

/* 😴 SNOOZE — keep alarmFired=true during countdown; only clear inside timer */
function snoozeAlarm(){
  stopAlarmSound();
  document.getElementById('alarm-alert').classList.remove('active');
  document.body.style.overflow='';
  var alarm=loadAlarm();
  var mins=parseInt(alarm.snooze,10)||10;
  snoozeUntilTs=Date.now()+(mins*60000);
  enableBedtime();
}

/* 🎵 KEEP VIBING — open Spotify, snooze automatically for 5 mins, keep bedtime & audio controls active */
function keepVibing() {
  stopAlarmSound();
  releaseAudioControl();

  document.getElementById('alarm-alert').classList.remove('active');
  document.body.style.overflow = '';

  var sp = loadSpotify();
  var urls = buildSpotifyUrls(sp.url);

  if (!urls.web && !urls.app) {
    alert('Add your Spotify link in Settings first.');
    return;
  }

  snoozeUntilTs = Date.now() + (5 * 60000);

  // Try Spotify app first
  if (urls.app) {
    window.location.href = urls.app;

    // Fallback to web link if app does not open
    setTimeout(function() {
      if (document.visibilityState !== 'hidden' && urls.web) {
        window.location.href = urls.web;
      }
    }, 1500);

  } else {
    window.location.href = urls.web;
  }

  render();
}

/* checkAlarm — fires once per unique date+time key; 5 s interval */
function checkAlarm(){
  var now = Date.now();
  if (snoozeUntilTs) {
    if (now >= snoozeUntilTs) {
      snoozeUntilTs = null;
      alarmFired = false;
      triggerAlarm();
    }
    return;
  }
  
  var alarm = loadAlarm(); if (!alarm.on || !alarm.time) return;
  var nowD = new Date();
  var dateKey = nowD.getFullYear() + '-' + String(nowD.getMonth() + 1).padStart(2, '0') + '-' + String(nowD.getDate()).padStart(2, '0') + '_' + alarm.time;
  
  var timeParts = alarm.time.split(':');
  var sched = new Date();
  sched.setHours(parseInt(timeParts[0],10), parseInt(timeParts[1],10), 0, 0);

  if (nowD >= sched && lastAlarmDateKey !== dateKey) {
    if (nowD.getTime() - sched.getTime() < 2 * 60 * 60 * 1000) {
      lastAlarmDateKey = dateKey;
      alarmFired = false;
      triggerAlarm();
    }
  }
}
setInterval(checkAlarm, 5000);

/* Prevents the alarm from automatically firing upon config updates or app starts if the time is already in the past */
function initAlarmState() {
  var alarm = loadAlarm();
  if (alarm.on && alarm.time) {
    var nowD = new Date();
    var dateKey = nowD.getFullYear() + '-' + String(nowD.getMonth() + 1).padStart(2, '0') + '-' + String(nowD.getDate()).padStart(2, '0') + '_' + alarm.time;
    var timeParts = alarm.time.split(':');
    var sched = new Date();
    sched.setHours(parseInt(timeParts[0],10), parseInt(timeParts[1],10), 0, 0);
    if (nowD >= sched) {
      lastAlarmDateKey = dateKey;
    } else {
      lastAlarmDateKey = null;
    }
  } else {
    lastAlarmDateKey = null;
  }
}

/* ── SPOTIFY DEEP LINK ─────────────────────────────────── */
function buildSpotifyUrls(rawUrl) {
  var raw = (rawUrl || '').trim();

  if (!raw) {
    return {
      app: '',
      web: ''
    };
  }

  // Remove tracking junk after ?
  var clean = raw.split('?')[0];

  // If user pasted Spotify URI
  if (clean.toLowerCase().startsWith('spotify:')) {
    var parts = clean.split(':');
    if (parts.length >= 3) {
      return {
        app: clean,
        web: 'https://open.spotify.com/' + parts[1] + '/' + parts[2]
      };
    }
  }

  // If user pasted normal open.spotify.com link
  var match = clean.match(/\/(track|album|playlist|artist|show|episode)\/([A-Za-z0-9\-_]+)/i);

  if (match) {
    return {
      app: 'spotify:' + match[1] + ':' + match[2],
      web: clean
    };
  }

  return {
    app: '',
    web: clean
  };
}

function doOpenSpotify(statusElId){
  releaseAudioControl();
  
  var sp   = loadSpotify();
  var urls = buildSpotifyUrls(sp.url);
  var el   = statusElId ? document.getElementById(statusElId) : null;

  if (!urls.web && !urls.app) {
    if (el) {
      el.textContent = 'Add Spotify link first';
      el.className = 'spotify-status err';
    } else {
      alert('Add your Spotify link in Settings first.');
    }
    return;
  }

  var appOpened = false;
  function onVisibilityChange(){
    if(document.visibilityState === 'hidden'){
      appOpened = true;
    }
  }

  if (urls.app) {
    document.addEventListener('visibilitychange', onVisibilityChange);
    window.location.href = urls.app;
  } else {
    window.location.href = urls.web;
    return;
  }

  setTimeout(function(){
    document.removeEventListener('visibilitychange', onVisibilityChange);
    if(!appOpened){
      window.location.href = urls.web;
    }
    if(el){ setTimeout(function(){ el.textContent=''; el.className='spotify-status'; }, 2000); }
  }, 2500);
}

/* ── DATA BACKUP & RESTORE ────────────────────────────── */
function exportBackup() {
  var backup = {
    roster: localStorage.getItem(ROSTER_KEY),
    alarm: localStorage.getItem(ALARM_KEY),
    spotify: localStorage.getItem(SPOTIFY_KEY),
    dont_forget: localStorage.getItem(DONT_FORGET_KEY),
    notes: localStorage.getItem(NOTES_KEY),
    reminders: localStorage.getItem(REMINDERS_KEY)
  };
  var fileBlob = new Blob([JSON.stringify(backup, null, 2)], {type: 'application/json'});
  var link = document.createElement('a');
  link.href = URL.createObjectURL(fileBlob);
  link.download = 'fifo_countdown_backup.json';
  link.click();
}

function importBackup(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (data.hasOwnProperty('roster') && data.roster !== null) localStorage.setItem(ROSTER_KEY, data.roster);
      if (data.hasOwnProperty('alarm') && data.alarm !== null) localStorage.setItem(ALARM_KEY, data.alarm);
      if (data.hasOwnProperty('spotify') && data.spotify !== null) localStorage.setItem(SPOTIFY_KEY, data.spotify);
      if (data.hasOwnProperty('dont_forget') && data.dont_forget !== null) localStorage.setItem(DONT_FORGET_KEY, data.dont_forget);
      if (data.hasOwnProperty('notes') && data.notes !== null) localStorage.setItem(NOTES_KEY, data.notes);
      if (data.hasOwnProperty('reminders') && data.reminders !== null) localStorage.setItem(REMINDERS_KEY, data.reminders);
      alert("Backup loaded successfully!");
      window.location.reload();
    } catch(err) {
      alert("Error parsing backup file. Please make sure it's a valid backup JSON.");
    }
  };
  reader.readAsText(file);
}

/* ── MAIN RENDER ───────────────────────────────────────── */
function render(){

  }

  var start=parseDate(roster.startDate), daysOn=parseInt(roster.daysOn,10), daysOff=parseInt(roster.daysOff,10);
  var shiftType=roster.shiftType || 'day';
  var now=today(), elapsed=diffDays(start,now);
  var cycleLen=daysOn+daysOff, cycles=elapsed>=0?Math.floor(elapsed/cycleLen):0;
  var curStart=addDays(start,cycles*cycleLen), curFlyHome=addDays(curStart,daysOn), curEnd=addDays(curStart,cycleLen);
  var isOnSwing=(elapsed>=0)&&(now<curFlyHome);
  var nextSwing=isOnSwing?null:curEnd;
  var dayOfSwing=Math.max(1,Math.min(daysOn,diffDays(curStart,now)+1));
  var daysLeft=Math.max(0,diffDays(now,curFlyHome));
  var offGone=isOnSwing?0:diffDays(curFlyHome,now);
  var offLeft=isOnSwing?daysOff:Math.max(0,daysOff-offGone);
  var pct=isOnSwing?Math.min(100,Math.round(((daysOn-daysLeft)/daysOn)*100)):Math.min(100,Math.round((offGone/daysOff)*100));
  var heroNum=isOnSwing?daysLeft:offLeft;
  
  var hc = isOnSwing ? (daysLeft <= 2 ? 'danger' : '') : 'done'; 
  var pbClass = isOnSwing ? '' : 'done'; 

  var h = '';

  h += generateCalendarHTML();

  var statusColor = isOnSwing ? 'var(--accent)' : 'var(--ok)';
  var statusDot = isOnSwing ? '🟠' : '🟢';
  var statusText = isOnSwing ? 'On Site' : 'On R&R';

  h += '<div class="stat-card wide" style="text-align: center; padding: 10px 14px; margin-bottom: 4px;">'
    + '<div class="stat-label">📅 Today’s Status</div>'

      + statusDot + ' ' + statusText + ' &bull; ' + formatDate(now)
    + '</div>'
    + '</div>';

  if (isOnSwing) {
    if (shiftType === 'night') {
      h += '<div class="shift-card">'
        + '<div class="shift-card-icon">🌙</div>'
        + '<div>'
          + '<div class="shift-card-title">Night Shift Active</div>'
          + '<div class="shift-card-sub">Sleep tight during the day, mate. Block out that sun.</div>'
        + '</div>'
        + '</div>';
    } else {
      h += '<div class="shift-card" style="border-left-color: var(--ok);">'
        + '<div class="shift-card-icon" style="filter: grayscale(0);">☀️</div>'
        + '<div>'
          + '<div class="shift-card-title" style="color: var(--ok);">Day Shift Active</div>'
          + '<div class="shift-card-sub">Stay hydrated. Keep grinding under the heat.</div>'
        + '</div>'
        + '</div>';
    }
  }

  h += '<div class="hero ' + (isOnSwing ? '' : 'on-rr') + '">'
      +'<div class="hero-label">'+(isOnSwing?'⛏️ Days Left on Site':'🏡 Days Left at Home')+'</div>'
      +'<div class="hero-number '+hc+'">'+heroNum+'</div>'
      +'<div class="hero-unit">'+(heroNum===1?'day left':'days left')+'</div>'
      +'<div class="hero-sub">'+(isOnSwing
        ?'Fly home <strong>'+(daysLeft===0?'today! ✈️':formatDate(curFlyHome))+'</strong>'
        :'Back on site <strong>'+formatDate(nextSwing||curFlyHome)+'</strong>')+'</div>'
      +'<div class="progress-wrap"><div class="progress-fill '+pbClass+'" style="width:'+pct+'%"></div></div>'
      +'<div class="progress-label">'
        +'<span>'+(isOnSwing?'Day 1':'Fly-home')+'</span>'
        +'<span>'+pct+'%</span>'
        +'<span>'+(isOnSwing?'Day '+daysOn:'Back on site')+'</span>'
      +'</div>'
    +'</div>'
    +'<div class="stat-grid">';

  if (isOnSwing) {
    h += '<div class="stat-card compact">'
        +'<div class="stat-label">✈️ Fly Home</div>'
        +'<div class="stat-value date-val" style="font-size: 15px; color: var(--accent);">' + formatDate(curFlyHome) + '</div>'
        +'<div class="stat-sub">Next travel day</div>'
      +'</div>'
      +'<div class="stat-card compact">'
        +'<div class="stat-label">🛫 Return To Site</div>'
        +'<div class="stat-value date-val" style="font-size: 15px; color: var(--text);">' + formatDate(addDays(curFlyHome, daysOff)) + '</div>'
        +'<div class="stat-sub">Next roster start</div>'
      +'</div>';
  } else {
    h += '<div class="stat-card wide compact" style="text-align: center;">'
        +'<div class="stat-label">🛫 Return To Site</div>'
        +'<div class="stat-value date-val" style="font-size: 16px; color: var(--ok);">' + formatDate(nextSwing || curEnd) + '</div>'
        +'<div class="stat-sub">Next roster start</div>'
      +'</div>';
  }

  h+='</div>'
    +'<div class="alarm-status-row hidden" id="alarm-status-line"></div>';

  if(msg){ msg.textContent='✓ Roster updated'; setTimeout(function(){ msg.textContent=''; },2500); }
}

/* ── Alarm subpage ─────────────────────────────────────── */
function openSubAlarm(){
  var alarm=loadAlarm();
  var snooze=parseInt(alarm.snooze,10)||10;
  var p5=snooze===5?'active':'', p10=snooze===10?'active':'', p15=snooze===15?'active':'';

  var h='<div class="panel-handle"></div>'
    +'<div class="panel-title">⏰ Alarm</div>'
    +'<button class="sub-back-btn" onclick="renderSettingsMenu()">Back to Settings</button>'
    +'<div class="panel-row">'
      +'<div><div class="panel-row-label">Wake-up Alarm</div><div class="panel-row-sub" id="alarm-toggle-sub">'+(alarm.on?'Rings at '+fmt12(alarm.time)+' daily':'Off')+'</div></div>'
      +'<div class="toggle-inline"><span class="toggle-status'+(alarm.on?' on':'')+'" id="alarm-toggle-label">'+(alarm.on?'ON':'OFF')+'</span>'
      +'<label class="toggle"><input type="checkbox" id="alarm-toggle"'+(alarm.on?' checked':'')+' onchange="toggleAlarm(this.checked)"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div>'
    +'</div>'
    +'<div class="form-group"><label for="alarm-time-input">Wake-up time</label><input type="time" class="time-input" id="alarm-time-input" value="'+(alarm.time||'06:00')+'"></div>'
    +'<div class="form-group"><label>Snooze duration</label><div class="snooze-pills">'
      +'<button type="button" class="snooze-pill '+p5+'" data-min="5" onclick="selectSnooze(5)">5 min</button>'
      +'<button type="button" class="snooze-pill '+p10+'" data-min="10" onclick="selectSnooze(10)">10 min</button>'
      +'<button type="button" class="snooze-pill '+p15+'" data-min="15" onclick="selectSnooze(15)">15 min</button>'
    +'</div></div>'
    +'<button class="panel-save-btn" onclick="saveAlarmSub()">Save Alarm</button>'
    +'<div id="alarm-sub-msg" style="padding:10px 22px 0;font-size:13px;color:var(--ok);"></div>'
    +'<div class="p-divider"></div>'
    +'<div class="p-section-head">Alarm Sound (iOS Setup)</div>'
    +'<div class="form-group" style="display:flex; flex-direction:column; gap:10px;">'
      +'<button type="button" class="panel-save-notes-btn" id="enable-sound-btn" style="margin:0; width:100%;" onclick="enableAlarmSound()">🔊 Enable Alarm Sound</button>'
      +'<button type="button" class="panel-save-notes-btn" id="test-sound-btn" style="margin:0; width:100%;" onclick="testAlarmSound()">🔊 Test Alarm Sound</button>'
    +'</div>'
    +'<div style="margin:18px 22px 0; background:rgba(224,90,78,0.08); border:1px solid rgba(224,90,78,0.25); border-radius:12px; padding:12px 14px;">'
      +'<div style="font-size:12px; font-weight:700; color:var(--danger); margin-bottom:6px; letter-spacing:0.03em;">⚠️ Important</div>'
      +'<div style="font-size:12px; color:var(--muted); line-height:1.55;">iPhone may stop web-based alarms if Safari is closed, the phone restarts, or iOS suspends background activity.<br><br>For best reliability, keep <strong style="color:var(--text);">Bedtime Mode active</strong> overnight.</div>'
    +'</div>';
  document.getElementById('settings-panel').innerHTML=h;

  setTimeout(function(){
    var ctx = getAudioCtx();
    if (ctx && ctx.state === 'running') {
      updateEnableBtn();
    }
  }, 50);
}

function toggleAlarm(on){
  var alarm=loadAlarm(); alarm.on=on; saveAlarm(alarm);
  var lbl=document.getElementById('alarm-toggle-label');
  var sub=document.getElementById('alarm-toggle-sub');
  if(lbl){ lbl.textContent=on?'ON':'OFF'; lbl.className='toggle-status'+(on?' on':''); }
  if(sub){ sub.textContent=on?('Rings at '+fmt12(alarm.time)+' daily'):'Off'; }
  if(!on){ alarmFired=false; snoozeUntilTs=null; }
  
  if (on) {
    audioReleasedForSpotify = false;
    var ctx = getAudioCtx();
    if (ctx) {
      ctx.resume().then(function() {
        startKeepAlive();
      }).catch(function(){});
    }
    playSilentLoop();
  }

  initAlarmState();
  renderAlarmStatus();
}

function selectSnooze(mins){
  document.querySelectorAll('.snooze-pill').forEach(function(p){
    p.classList.toggle('active', parseInt(p.dataset.min,10)===mins);
  });
  var alarm=loadAlarm(); alarm.snooze=mins; saveAlarm(alarm);
}

function saveAlarmSub(){
  var t=document.getElementById('alarm-time-input').value;
  if(!t){ showPanelMsg('Please pick a wake-up time.'); return; }
  var alarm=loadAlarm();
  var prevTime=alarm.time;
  alarm.time=t;
  alarm.on=document.getElementById('alarm-toggle').checked;
  var activePill=document.querySelector('.snooze-pill.active');
  alarm.snooze=activePill?parseInt(activePill.dataset.min,10):(alarm.snooze||10);
  saveAlarm(alarm);
  
  alarmFired=false;
  snoozeUntilTs=null;
  audioReleasedForSpotify = false;
  if(t !== prevTime){
    lastAlarmDateKey=null;
  }
  
  initAlarmState();
  renderAlarmStatus();
  
  var ctx = getAudioCtx();
  if (ctx) {
    ctx.resume().then(function() {
      startKeepAlive();
    }).catch(function(){});
  }
  playSilentLoop();

  var msg=document.getElementById('alarm-sub-msg');
  if(msg){ msg.textContent='✓ Alarm saved'; setTimeout(function(){ msg.textContent=''; },2000); }
}

/* ── Spotify subpage ───────────────────────────────────── */
function openSubSpotify(){
  var sp=loadSpotify();
  var h='<div class="panel-handle"></div>'
    +'<div class="panel-title">🎵 Spotify</div>'
    +'<button class="sub-back-btn" onclick="renderSettingsMenu()">Back to Settings</button>'
    +'<div class="form-group" style="margin-bottom:14px;">'
      +'<label for="spotify-url-input">Playlist, album, or track link</label>'
      +'<input type="url" class="spotify-url-input" id="spotify-url-input" placeholder="https://open.spotify.com/playlist/…" value="'+(sp.url||'')+'">'
    +'</div>'
    +'<div class="form-group" style="margin-bottom:14px;">'
      +'<button class="spotify-test-btn" onclick="testSpotifyLink()">🎵 Test — Open Spotify Now</button>'
    +'</div>'
    +'<button class="panel-save-btn spotify-save" onclick="saveSpotifySub()">💾 Save Spotify Link</button>'
    +'<div class="spotify-status" id="spotify-status" style="padding:10px 22px 0;"></div>';
  document.getElementById('settings-panel').innerHTML=h;
}

function testSpotifyLink(){
  var input=document.getElementById('spotify-url-input');
  var url=(input?input.value:'').trim();
  if(url) saveSpotify({url:url});
  doOpenSpotify('spotify-status');
}

function saveSpotifySub(){
  var input=document.getElementById('spotify-url-input');
  var url=(input?input.value:'').trim();
  saveSpotify({url:url});
  var s=document.getElementById('spotify-status');
  if(s){ s.textContent=url?'✓ Saved':'Cleared'; s.className=url?'spotify-status ok':'spotify-status';
    setTimeout(function(){ s.textContent=''; s.className='spotify-status'; },2500); }
}

/* ── Don't Forget subpage ──────────────────────────────── */
function openSubDontForget(){
  var saved=localStorage.getItem(DONT_FORGET_KEY)||'';
  var h='<div class="panel-handle"></div>'
    +'<div class="panel-title">📌 Don\'t Forget List</div>'
    +'<button class="sub-back-btn" onclick="renderSettingsMenu()">Back to Settings</button>'
    +'<div class="form-group" style="margin-bottom:10px;">'
      +'<textarea id="dont-forget-textarea" class="panel-textarea" oninput="autosaveDontForget()" '
        +'placeholder="• Flight check-in&#10;• Site access card&#10;• Chargers&#10;• Medications&#10;• Don\'t get lost"></textarea>'
    +'</div>'
    +'<button class="panel-save-notes-btn" id="dont-forget-save-btn" onclick="saveDontForget()">💾 Save List</button>';
  document.getElementById('settings-panel').innerHTML=h;
  var ta=document.getElementById('dont-forget-textarea');
  if(ta) ta.value=saved;
}

var dontForgetAutosaveTimer=null;
function autosaveDontForget(){
  if(dontForgetAutosaveTimer) clearTimeout(dontForgetAutosaveTimer);
  dontForgetAutosaveTimer=setTimeout(function(){ saveDontForget(true); },800);
}
function saveDontForget(silent){
  var ta=document.getElementById('dont-forget-textarea');
  var btn=document.getElementById('dont-forget-save-btn');
  if(!ta) return;
  localStorage.setItem(DONT_FORGET_KEY,ta.value);
  if(!silent&&btn){
    btn.textContent='✓ Saved'; btn.classList.add('saved');
    setTimeout(function(){ btn.textContent='💾 Save List'; btn.classList.remove('saved'); },1800);
  }
}

/* ── Notes subpage ─────────────────────────────────────── */
function openSubNotes(){
  var saved=localStorage.getItem(NOTES_KEY)||'';
  var h='<div class="panel-handle"></div>'
    +'<div class="panel-title">📝 Notes</div>'
    +'<button class="sub-back-btn" onclick="renderSettingsMenu()">Back to Settings</button>'
    +'<div class="form-group" style="margin-bottom:10px;">'
      +'<textarea id="notes-textarea" class="panel-textarea" oninput="autosaveNotes()" '
        +'placeholder="Notes for this swing…"></textarea>'

var notesAutosaveTimer=null;
function autosaveNotes(){

function saveNotesSub(silent){

/* ── Backup subpage ────────────────────────────────────── */
function openSubBackup(){
  var h='<div class="panel-handle"></div>'
    +'<div class="panel-title">💾 Backup &amp; Restore</div>'
    +'<button class="sub-back-btn" onclick="renderSettingsMenu()">Back to Settings</button>'
    +'<div class="p-section-head">Export Backup</div>'
    +'<div class="form-group">'
      +'<button class="panel-save-notes-btn" style="margin:0; width:100%;" onclick="exportBackup()">📤 Export Data to File</button>'
    +'</div>'
    +'<div class="p-divider"></div>'
    +'<div class="p-section-head">Import Backup</div>'
    +'<div class="form-group">'
      +'<label for="import-file-input" style="cursor:pointer;" class="panel-save-notes-btn">📥 Select Backup File</label>'
      +'<input type="file" id="import-file-input" accept=".json" onchange="importBackup(event)" style="display:none;">'
    +'</div>';

}

/* ── Utility ───────────────────────────────────────────── */
function step(id,delta){
  var el=document.getElementById(id), v=parseInt(el.value,10)||0;
  el.value=Math.max(parseInt(el.min,10)||1,Math.min(parseInt(el.max,10)||365,v+delta));
}
function showPanelMsg(msg){
  var existing=document.getElementById('_panel_err');
  if(existing) existing.remove();
  var d=document.createElement('div');
  d.id='_panel_err';
  d.style.cssText='padding:10px 22px;color:var(--danger);font-size:14px;';
  d.textContent=msg;
  var panel=document.getElementById('settings-panel');
  if(panel) panel.appendChild(d);
}

(function(){
  var splash=document.getElementById('splash');
  var appWrap=document.getElementById('app-wrapper');
  setTimeout(function(){
    splash.classList.add('fade-out');
    appWrap.classList.add('visible');
    setTimeout(function(){ splash.style.display='none'; },650);
  },2300);
})();

render();
initAlarmState();
var msToMidnight=function(){
  var n=new Date();
  return new Date(n.getFullYear(),n.getMonth(),n.getDate()+1)-n;
};
setTimeout(function(){ render(); setInterval(render,86400000); }, msToMidnight());
</script>
