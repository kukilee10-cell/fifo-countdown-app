<!DOCTYPE html>
<html lang="en">
<head>
  <head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- Favicon (browser tab) -->
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">

<!-- iPhone / iPad Home Screen icon -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

<!-- Android / Chrome PWA manifest -->
<link rel="manifest" href="manifest.json">

<!-- iOS full-screen mode -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Android theme colour -->

<title>FIFO Countdown</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FIFO Countdown</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg:        #0d0f12;
    --surface:   #161a1f;
    --card:      #1e2329;
    --border:    #2a3040;
    --accent:    #f5a623;
    --accent-dk: #c4831a;
    --danger:    #e05a4e;
    --ok:        #4caf50;
    --text:      #e8ecf0;
    --muted:     #7a8694;
    --mono:      'DM Mono', monospace;
    --sans:      'Inter', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }

  /* ════════════════════════════════════════════════════════════
     SPLASH SCREEN
  ════════════════════════════════════════════════════════════ */
  #splash {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #0d0f12;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: opacity 0.55s ease;
    pointer-events: all;
    overflow: hidden;
  }
  #splash.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  /* Subtle grid lines in background */
  #splash::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Radial glow behind icon */
  #splash::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, rgba(245,166,35,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Corner accent brackets */
  .splash-corner {
    position: absolute;
    width: 28px;
    height: 28px;
    border-color: rgba(245,166,35,0.2);
    border-style: solid;
    animation: splashFadeIn 0.6s ease 0.1s both;
  }
  .splash-corner.tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
  .splash-corner.tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
  .splash-corner.bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
  .splash-corner.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

  /* Badge pill */
  .splash-badge {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--accent-dk);
    background: rgba(245,166,35,0.08);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 99px;
    padding: 5px 14px;
    margin-bottom: 30px;
    animation: splashFadeUp 0.5s ease 0.15s both;
  }

  /* Main icon */
  .splash-icon {
    font-size: 58px;
    line-height: 1;
    margin-bottom: 22px;
    animation: splashFadeUp 0.5s ease 0.25s both, splashGlow 2s ease-in-out 0.8s infinite alternate;
    position: relative;
    z-index: 1;
  }

  /* App name */
  .splash-title {
    font-family: var(--mono);
    font-size: clamp(30px, 8.5vw, 42px);
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
    animation: splashFadeUp 0.5s ease 0.35s both;
    position: relative;
    z-index: 1;
  }
  .splash-title .accent { color: var(--accent); }

  /* Tagline */
  .splash-tagline {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: 0.05em;
    margin-top: 10px;
    animation: splashFadeUp 0.5s ease 0.45s both;
    position: relative;
    z-index: 1;
  }

  /* Loading bar */
  .splash-bar-wrap {
    margin-top: 56px;
    width: min(260px, 70vw);
    height: 3px;
    background: rgba(42,48,64,0.8);
    border-radius: 99px;
    overflow: hidden;
    animation: splashFadeIn 0.4s ease 0.5s both;
    position: relative;
    z-index: 1;
  }
  .splash-bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent-dk), var(--accent), #ffc85a);
    animation: splashLoad 1.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.55s forwards;
    box-shadow: 0 0 8px rgba(245,166,35,0.5);
  }

  /* "Loading" label */
  .splash-loading-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #3a4450;
    margin-top: 10px;
    animation: splashFadeIn 0.4s ease 0.65s both;
    position: relative;
    z-index: 1;
  }

  @keyframes splashFadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes splashFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes splashLoad {
    0%   { width: 0%; }
    50%  { width: 70%; }
    80%  { width: 90%; }
    100% { width: 100%; }
  }
  @keyframes splashGlow {
    from { filter: drop-shadow(0 0 10px rgba(245,166,35,0.2)); }
    to   { filter: drop-shadow(0 0 28px rgba(245,166,35,0.55)); }
  }

  /* ════════════════════════════════════════════════════════════
     APP WRAPPER
  ════════════════════════════════════════════════════════════ */
  #app-wrapper {
    display: contents;
    opacity: 0;
    transition: opacity 0.45s ease;
  }
  #app-wrapper.visible {
    opacity: 1;
  }

  /* ════════════════════════════════════════════════════════════
     HEADER
  ════════════════════════════════════════════════════════════ */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .logo span { color: var(--muted); }
  .settings-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 18px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    min-height: 44px;
  }
  .settings-btn:active { background: var(--border); }

  /* ════════════════════════════════════════════════════════════
     MAIN
  ════════════════════════════════════════════════════════════ */
  main {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 20px 16px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
    gap: 16px;
  }
  .empty-icon { font-size: 56px; line-height: 1; }
  .empty-title { font-size: 22px; font-weight: 700; }
  .empty-sub { font-size: 16px; color: var(--muted); line-height: 1.5; }
  .cta-btn {
    margin-top: 8px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 18px 36px;
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    min-height: 56px;
    transition: background 0.15s, transform 0.1s;
  }
  .cta-btn:active { background: var(--accent-dk); transform: scale(0.98); }

  .hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent-dk), var(--accent), var(--accent-dk));
  }
  .hero-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .hero-number {
    font-family: var(--mono);
    font-size: clamp(72px, 22vw, 100px);
    font-weight: 500;
    line-height: 1;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .hero-number.danger { color: var(--danger); }
  .hero-number.done   { color: var(--ok); }
  .hero-unit {
    font-family: var(--mono);
    font-size: 16px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }
  .hero-sub { margin-top: 14px; font-size: 15px; color: var(--muted); }
  .hero-sub strong { color: var(--text); font-weight: 600; }

  .progress-wrap {
    margin-top: 18px;
    background: var(--border);
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent-dk), var(--accent));
    transition: width 0.5s ease;
    min-width: 4px;
  }
  .progress-fill.done { background: var(--ok); }
  .progress-label {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 14px;
  }
  .stat-card.wide { grid-column: 1 / -1; }
  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 26px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .stat-value.accent { color: var(--accent); }
  .stat-value.ok     { color: var(--ok); }
  .stat-value.danger { color: var(--danger); }
  .stat-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: flex-end;
  }
  .overlay.open { display: flex; }
  .panel {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-height: 90dvh;
    overflow-y: auto;
    padding: 8px 0 40px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .panel-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin: 12px auto 20px;
  }
  .panel-title {
    font-size: 20px;
    font-weight: 700;
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .form-group { padding: 0 20px; margin-bottom: 20px; }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  input[type="date"],
  input[type="number"] {
    display: block;
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 20px;
    padding: 16px 14px;
    outline: none;
    transition: border-color 0.15s;
    min-height: 56px;
    -webkit-appearance: none;
  }
  input[type="date"]:focus,
  input[type="number"]:focus { border-color: var(--accent); }
  input[type="number"] { -moz-appearance: textfield; }
  input::-webkit-inner-spin-button,
  input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .stepper { display: flex; align-items: center; gap: 12px; }
  .stepper input { flex: 1; text-align: center; }
  .step-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    width: 56px;
    height: 56px;
    font-size: 26px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.1s, border-color 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .step-btn:active { background: var(--border); border-color: var(--accent); }

  .save-btn {
    display: block;
    width: calc(100% - 40px);
    margin: 24px 20px 0;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 18px;
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    min-height: 56px;
    transition: background 0.15s, transform 0.1s;
  }
  .save-btn:active { background: var(--accent-dk); transform: scale(0.98); }

  .clear-btn {
    display: block;
    width: calc(100% - 40px);
    margin: 12px 20px 0;
    background: transparent;
    color: var(--danger);
    border: 1.5px solid var(--danger);
    border-radius: 14px;
    padding: 16px;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    min-height: 52px;
    transition: background 0.15s;
  }
  .clear-btn:active { background: rgba(224,90,78,0.12); }

  .divider { height: 1px; background: var(--border); margin: 4px 20px 20px; }
  .section-head {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 20px 12px;
  }

  .today-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--muted);
    padding: 0 2px;
  }
  .today-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash" aria-hidden="true">
  <div class="splash-corner tl"></div>
  <div class="splash-corner tr"></div>
  <div class="splash-corner bl"></div>
  <div class="splash-corner br"></div>
  <div class="splash-badge">FIFO Worker App</div>
  <div class="splash-icon">⛏️</div>
  <div class="splash-title">FIFO <span class="accent">Countdown</span></div>
  <div class="splash-tagline">Counting down to R&amp;R</div>
  <div class="splash-bar-wrap">
    <div class="splash-bar-fill"></div>
  </div>
  <div class="splash-loading-label">Loading&hellip;</div>
</div>

<!-- APP -->
<div id="app-wrapper">

<header>
  <div class="logo">FIFO <span>// Countdown</span></div>
  <button class="settings-btn" onclick="openPanel()">⚙ Roster</button>
</header>

<main id="main-content"></main>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="panel" id="panel">
    <div class="panel-handle"></div>
    <div class="panel-title">My Roster</div>

    <div class="section-head">Swing Start Date</div>
    <div class="form-group">
      <label for="startDate">First day on site</label>
      <input type="date" id="startDate">
    </div>

    <div class="divider"></div>
    <div class="section-head">Roster Pattern</div>

    <div class="form-group">
      <label for="daysOn">Days ON</label>
      <div class="stepper">
        <button class="step-btn" onclick="step('daysOn',-1)">−</button>
        <input type="number" id="daysOn" min="1" max="365" value="14">
        <button class="step-btn" onclick="step('daysOn',1)">+</button>
      </div>
    </div>

    <div class="form-group">
      <label for="daysOff">Days OFF</label>
      <div class="stepper">
        <button class="step-btn" onclick="step('daysOff',-1)">−</button>
        <input type="number" id="daysOff" min="1" max="365" value="7">
        <button class="step-btn" onclick="step('daysOff',1)">+</button>
      </div>
    </div>

    <button class="save-btn" onclick="saveAndClose()">Save Roster</button>
    <button class="clear-btn" onclick="clearRoster()">Clear Roster</button>
  </div>
</div>

</div><!-- #app-wrapper -->

<script>
// ── Splash ────────────────────────────────────────────────────
(function () {
  var SPLASH_DURATION = 2300;
  var FADE_DURATION   = 550;
  var splash  = document.getElementById('splash');
  var appWrap = document.getElementById('app-wrapper');
  setTimeout(function () {
    splash.classList.add('fade-out');
    appWrap.classList.add('visible');
    setTimeout(function () { splash.style.display = 'none'; }, FADE_DURATION + 50);
  }, SPLASH_DURATION);
})();

// ── Storage ───────────────────────────────────────────────────
var STORAGE_KEY = 'fifo_roster_v1';
function load() {
  try { var r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; }
  catch(e) { return null; }
}
function save(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

// ── Date helpers ──────────────────────────────────────────────
function today() { var d = new Date(); d.setHours(0,0,0,0); return d; }
function parseDate(str) { var p = str.split('-').map(Number); return new Date(p[0], p[1]-1, p[2]); }
function formatDate(d) { return d.toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short', year:'numeric' }); }
function diffDays(a, b) { return Math.round((b - a) / 86400000); }
function addDays(d, n) { var r = new Date(d); r.setDate(r.getDate() + n); return r; }

// ── Render ────────────────────────────────────────────────────
function render() {
  var roster = load();
  var el = document.getElementById('main-content');

  if (!roster) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">⛏️</div><div class="empty-title">Set up your roster</div><div class="empty-sub">Enter your swing start date and roster pattern to start counting down.</div><button class="cta-btn" onclick="openPanel()">Enter Roster Details</button></div>';
    return;
  }

  var start      = parseDate(roster.startDate);
  var daysOn     = parseInt(roster.daysOn,  10);
  var daysOff    = parseInt(roster.daysOff, 10);
  var now        = today();
  var dayOfRoster = diffDays(start, now) + 1;
  var cycleLen   = daysOn + daysOff;
  var elapsed    = diffDays(start, now);
  var cycles     = elapsed >= 0 ? Math.floor(elapsed / cycleLen) : 0;
  var curCycleStart = addDays(start, cycles * cycleLen);
  var curFlyHome    = addDays(curCycleStart, daysOn);
  var curCycleOffEnd = addDays(curCycleStart, cycleLen);

  var isOnSwing = (elapsed >= 0) && (now < curFlyHome);
  var nextSwingStart = isOnSwing ? null : curCycleOffEnd;

  var actualDayOfSwing = Math.max(1, Math.min(daysOn, diffDays(curCycleStart, now) + 1));
  var actualDaysLeft   = Math.max(0, diffDays(now, curFlyHome));
  var offDaysGone      = isOnSwing ? 0 : diffDays(curFlyHome, now);
  var offDaysLeft      = isOnSwing ? daysOff : Math.max(0, daysOff - offDaysGone);

  var pct = isOnSwing
    ? Math.min(100, Math.round(((daysOn - actualDaysLeft) / daysOn) * 100))
    : Math.min(100, Math.round((offDaysGone / daysOff) * 100));

  var heroNum   = isOnSwing ? actualDaysLeft : offDaysLeft;
  var heroClass = isOnSwing ? (actualDaysLeft <= 2 ? 'danger' : '') : 'ok';

  var html = '<div class="hero">'
    + '<div class="hero-label">' + (isOnSwing ? 'Days left on swing' : 'Days left at home') + '</div>'
    + '<div class="hero-number ' + heroClass + '">' + heroNum + '</div>'
    + '<div class="hero-unit">' + (heroNum === 1 ? 'day' : 'days') + '</div>'
    + '<div class="hero-sub">' + (isOnSwing
        ? 'Fly home <strong>' + (actualDaysLeft === 0 ? 'today! ✈️' : formatDate(curFlyHome)) + '</strong>'
        : 'Back on site <strong>' + formatDate(nextSwingStart || curFlyHome) + '</strong>')
    + '</div>'
    + '<div class="progress-wrap"><div class="progress-fill ' + (isOnSwing ? '' : 'done') + '" style="width:' + pct + '%"></div></div>'
    + '<div class="progress-label"><span>' + (isOnSwing ? 'Day 1' : 'Fly-home') + '</span><span>' + pct + '%</span><span>' + (isOnSwing ? 'Day ' + daysOn : 'Back on site') + '</span></div>'
    + '</div>'
    + '<div class="stat-grid">';

  if (isOnSwing) {
    html += '<div class="stat-card"><div class="stat-label">Swing Day</div><div class="stat-value accent">' + actualDayOfSwing + ' <span style="font-size:14px;color:var(--muted)">/ ' + daysOn + '</span></div><div class="stat-sub">of ' + daysOn + ' days on</div></div>'
      + '<div class="stat-card"><div class="stat-label">Days Left</div><div class="stat-value ' + (actualDaysLeft <= 2 ? 'danger' : '') + '">' + actualDaysLeft + '</div><div class="stat-sub">until fly-home</div></div>'
      + '<div class="stat-card wide"><div class="stat-label">Fly-home Date</div><div class="stat-value" style="font-size:20px">' + formatDate(curFlyHome) + ' ✈️</div></div>'
      + '<div class="stat-card"><div class="stat-label">Days Off</div><div class="stat-value ok">' + daysOff + '</div><div class="stat-sub">when you get home</div></div>'
      + '<div class="stat-card"><div class="stat-label">Back on Site</div><div class="stat-value" style="font-size:18px">' + formatDate(addDays(curFlyHome, daysOff)) + '</div></div>';
  } else {
    html += '<div class="stat-card wide"><div class="stat-label">You\'re home! 🏠</div><div class="stat-value ok">' + offDaysLeft + '</div><div class="stat-sub">days off remaining</div></div>'
      + '<div class="stat-card wide"><div class="stat-label">Back on site</div><div class="stat-value" style="font-size:20px">' + formatDate(nextSwingStart) + '</div></div>'
      + '<div class="stat-card"><div class="stat-label">Days Off Gone</div><div class="stat-value">' + offDaysGone + '</div><div class="stat-sub">of ' + daysOff + '</div></div>'
      + '<div class="stat-card"><div class="stat-label">Roster Pattern</div><div class="stat-value">' + daysOn + '/' + daysOff + '</div><div class="stat-sub">on / off</div></div>';
  }

  html += '</div><div class="today-row"><div class="today-dot"></div>Today is ' + formatDate(now) + ' &bull; ' + roster.daysOn + '/' + roster.daysOff + ' roster</div>';
  el.innerHTML = html;
}

// ── Panel ─────────────────────────────────────────────────────
function openPanel() {
  var roster = load();
  if (roster) {
    document.getElementById('startDate').value = roster.startDate;
    document.getElementById('daysOn').value    = roster.daysOn;
    document.getElementById('daysOff').value   = roster.daysOff;
  } else {
    var d = new Date();
    var pad = function(n) { return String(n).padStart(2,'0'); };
    document.getElementById('startDate').value = d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    document.getElementById('daysOn').value  = '14';
    document.getElementById('daysOff').value = '7';
  }
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closePanel(); }
function saveAndClose() {
  var startDate = document.getElementById('startDate').value;
  var daysOn    = parseInt(document.getElementById('daysOn').value, 10);
  var daysOff   = parseInt(document.getElementById('daysOff').value, 10);
  if (!startDate)           { alert('Please enter your swing start date.'); return; }
  if (!daysOn  || daysOn  < 1) { alert('Days ON must be at least 1.');  return; }
  if (!daysOff || daysOff < 1) { alert('Days OFF must be at least 1.'); return; }
  save({ startDate: startDate, daysOn: daysOn, daysOff: daysOff });
  closePanel(); render();
}
function clearRoster() {
  if (confirm('Clear your roster details?')) {
    localStorage.removeItem(STORAGE_KEY); closePanel(); render();
  }
}
function step(id, delta) {
  var el = document.getElementById(id);
  var val = parseInt(el.value, 10) || 0;
  el.value = Math.max(parseInt(el.min,10)||1, Math.min(parseInt(el.max,10)||365, val + delta));
}

// ── Boot ──────────────────────────────────────────────────────
render();
var msToMidnight = function() {
  var now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), now.getDate()+1) - now;
};
setTimeout(function() { render(); setInterval(render, 86400000); }, msToMidnight());
</script>
</body>
</html>
